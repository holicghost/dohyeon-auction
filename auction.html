<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OW 경매 참가</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyA0czyhDNksFIN8097sE0dJcErcYBZGC5s",
      authDomain: "dohyeon-4e4e0.firebaseapp.com",
      databaseURL: "https://dohyeon-4e4e0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "dohyeon-4e4e0",
      storageBucket: "dohyeon-4e4e0.firebasestorage.app",
      messagingSenderId: "231075336771",
      appId: "1:231075336771:web:6a111f7c1aa9a2ae4a3af6"
    };
    const app = initializeApp(firebaseConfig);
    window._db = getDatabase(app);
    window._dbFns = { ref, onValue, update, get };
  </script>
  <style>
    :root{
      --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e3a5f;
      --accent:#f59e0b;--accent2:#3b82f6;--text:#e2e8f0;--muted:#64748b;
      --danger:#ef4444;--success:#22c55e;--preview:#818cf8;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;
      letter-spacing:-0.03em;min-height:100vh;padding:12px 14px;
      background-image:radial-gradient(ellipse at 20% 50%,rgba(59,130,246,.06) 0%,transparent 60%),
                       radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.06) 0%,transparent 60%);}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
    .logo{font-family:'Pretendard',sans-serif;font-weight:900;font-size:1.7rem;letter-spacing:-1px;color:#f59e0b;cursor:pointer;}
    .badge-team{background:rgba(59,130,246,.15);border:1px solid var(--accent2);border-radius:20px;
      padding:4px 12px;font-size:.8rem;color:var(--accent2);font-weight:700;}
    .badge-obs{background:var(--surface2);border:1px solid var(--border);border-radius:20px;
      padding:4px 12px;font-size:.8rem;color:var(--muted);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
    .card-title{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}

    /* ── 2컬럼 레이아웃 ── */
    .auction-layout{display:grid;grid-template-columns:320px 1fr 280px;gap:12px;align-items:start;}
    @media(max-width:1200px){.auction-layout{grid-template-columns:280px 1fr 240px;}}
    @media(max-width:820px){.auction-layout{grid-template-columns:1fr;}}
    .left-panel{display:flex;flex-direction:column;gap:12px;}

    /* ── 선수 카드 ── */
    .player-card{
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      border:1px solid var(--border);border-radius:14px;padding:18px;
      position:relative;overflow:hidden;margin-bottom:12px;
    }
    .player-card::before{content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(245,158,11,.05),transparent 60%);pointer-events:none;}
    .grade-banner{position:absolute;top:0;left:0;right:0;height:4px;}
    .grade-고{background:linear-gradient(90deg,#ef4444,#f97316);}
    .grade-저{background:linear-gradient(90deg,#3b82f6,#6366f1);}
    .pc-top{display:flex;gap:14px;align-items:flex-start;margin-top:6px;}
    .pc-photo{width:140px;height:140px;border-radius:12px;background:var(--surface2);
      border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;
      justify-content:center;font-size:3rem;overflow:hidden;}
    .pc-photo img{width:100%;height:100%;object-fit:cover;}
    .pc-info{flex:1;min-width:0;}
    .pc-grade-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
      border-radius:4px;font-size:.7rem;font-weight:700;margin-bottom:5px;}
    .gb-고{background:rgba(239,68,68,.2);color:#ef4444;border:1px solid #ef4444;}
    .gb-저{background:rgba(59,130,246,.2);color:#3b82f6;border:1px solid #3b82f6;}
    .pc-name{font-family:'Black Han Sans',sans-serif;font-size:2.3rem;line-height:1.1;margin-bottom:7px;}
    .pc-tiers{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:7px;}
    .tier-item{display:flex;flex-direction:column;gap:2px;}
    .tier-label{font-size:.62rem;color:var(--muted);}
    .tier-val{font-size:.88rem;font-weight:700;}
    .hero-icon-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px;}
    .hero-icon{width:46px;height:46px;border-radius:8px;overflow:hidden;border:2px solid var(--border);
      background:var(--surface2);flex-shrink:0;position:relative;}
    .hero-icon img{width:100%;height:100%;object-fit:cover;}
    .hero-icon-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);
      font-size:.46rem;text-align:center;padding:1px 2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hero-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:.72rem;}
    .pc-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:10px;}
    .pc-table td{padding:5px 8px;border-bottom:1px solid rgba(30,58,95,.4);}
    .pc-table td:first-child{color:var(--muted);width:38%;font-size:.72rem;}
    .pc-table td:last-child{color:var(--text);font-weight:500;}
    .pc-intro{margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.04);
      border-radius:8px;font-size:.82rem;color:var(--muted);border-left:3px solid var(--accent);}

    /* ── 타이머 + 입찰 ── */
    .timer-bid-section{margin-top:14px;}
    .bid-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px;}
    .bid-amount{font-family:'Black Han Sans',sans-serif;font-size:2.2rem;color:var(--accent);}
    .bid-team{font-size:.82rem;color:var(--accent2);margin-top:2px;}
    .timer-bar-wrap{width:100%;height:10px;background:var(--surface2);border-radius:6px;overflow:hidden;margin-bottom:10px;}
    .timer-bar{height:100%;border-radius:6px;transition:width .05s linear,background .3s;}
    .tbar-preview{background:linear-gradient(90deg,var(--preview),#a78bfa);}
    .tbar-bid{background:linear-gradient(90deg,var(--accent),#f97316);}
    .tbar-urgent{background:linear-gradient(90deg,var(--danger),#f97316);animation:flicker .4s infinite;}
    @keyframes flicker{0%,100%{opacity:1}50%{opacity:.7}}
    .timer-bottom{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .phase-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:.8rem;font-weight:700;}
    .pb-preview{background:rgba(129,140,248,.15);color:var(--preview);border:1px solid var(--preview);}
    .pb-bidding{background:rgba(245,158,11,.15);color:var(--accent);border:1px solid var(--accent);}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pdot .8s infinite;}
    @keyframes pdot{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
    .timer-countdown{display:flex;align-items:baseline;gap:4px;}
    .timer-big{font-family:'Black Han Sans',sans-serif;font-size:2.8rem;line-height:1;transition:color .2s;}
    .timer-sec-label{font-size:.75rem;color:var(--muted);}
    .t-preview{color:var(--preview);}
    .t-normal{color:var(--text);}
    .t-urgent{color:var(--danger);animation:pt .5s infinite;}
    @keyframes pt{0%,100%{opacity:1}50%{opacity:.4}}
    .bid-locked{padding:12px;background:rgba(129,140,248,.08);border:1px solid var(--preview);
      border-radius:10px;color:var(--preview);font-size:.88rem;text-align:center;}
    .my-pts{font-size:.82rem;color:var(--muted);margin-bottom:10px;text-align:center;}
    .my-pts span{color:var(--accent);font-weight:700;font-size:1.05rem;}
    .bid-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px;}
    .bid-btn{padding:10px 0;border:1px solid var(--border);border-radius:8px;background:var(--surface2);
      color:var(--text);font-size:.85rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center;}
    .bid-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:rgba(245,158,11,.08);}
    .bid-btn:disabled{opacity:.3;cursor:not-allowed;}
    .custom-bid{display:flex;gap:8px;}
    .custom-bid input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      color:var(--text);padding:10px 12px;font-size:.9rem;font-family:inherit;outline:none;}
    .custom-bid input:focus{border-color:var(--accent2);}
    .btn-bid{padding:10px 18px;background:linear-gradient(135deg,var(--accent),#d97706);border:none;
      border-radius:8px;color:#0a0e1a;font-weight:700;font-family:inherit;font-size:.9rem;cursor:pointer;transition:all .2s;}
    .btn-bid:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,158,11,.4);}
    .btn-bid:disabled{opacity:.3;cursor:not-allowed;}

    /* ── 오른쪽 패널: 경매 순서 ── */
    .right-panel{display:flex;flex-direction:column;gap:12px;}
    .order-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
    .order-section-title{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;
      display:flex;align-items:center;gap:6px;}
    .order-tier-badge{padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700;}
    .tb-고{background:rgba(239,68,68,.2);color:#ef4444;border:1px solid #ef4444;}
    .tb-저{background:rgba(59,130,246,.2);color:#3b82f6;border:1px solid #3b82f6;}
    .order-cards{display:flex;gap:8px;flex-wrap:wrap;}
    .order-card{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;}
    .order-card.current .oc-photo{border-color:var(--accent);box-shadow:0 0 10px rgba(245,158,11,.5);}
    .oc-photo{width:60px;height:60px;border-radius:8px;overflow:hidden;background:var(--surface2);
      border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
    .oc-photo img{width:100%;height:100%;object-fit:cover;}
    .oc-badge{display:flex;gap:3px;align-items:center;}
    .oc-grade{font-size:.55rem;font-weight:700;padding:1px 4px;border-radius:3px;}
    .oc-grade-고{background:rgba(239,68,68,.2);color:#ef4444;}
    .oc-grade-저{background:rgba(59,130,246,.2);color:#3b82f6;}
    .oc-tier{font-size:.55rem;color:rgba(255,255,255,.7);background:rgba(0,0,0,.4);padding:1px 4px;border-radius:3px;}
    .oc-name{font-size:.62rem;color:var(--text);max-width:62px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .oc-arrow{font-size:.7rem;color:var(--muted);align-self:center;padding-bottom:16px;}

    /* ── 팀 패널 ── */
    .team-panel{border-radius:12px;overflow:hidden;border:2px solid transparent;margin-bottom:8px;transition:border-color .3s;}
    .team-panel.mine{border-color:rgba(255,255,255,.5);}
    .team-panel.leading{border-color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.4);}
    .team-panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;}
    .team-panel-name{font-size:.82rem;font-weight:800;color:rgba(255,255,255,.9);letter-spacing:.5px;}
    .team-panel-pts{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:rgba(255,255,255,.95);}
    .team-panel-pts span{font-size:.6rem;font-family:'Pretendard',sans-serif;font-weight:400;opacity:.7;margin-left:2px;}
    /* 멤버 그리드: 팀장 + 팀원들 같은 크기로 */
    .team-members-grid{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px 10px;}
    .tm-card{width:72px;display:flex;flex-direction:column;align-items:center;gap:3px;}
    .tm-card.empty .tm-photo{border:2px dashed rgba(255,255,255,.15);background:rgba(0,0,0,.25);}
    .tm-photo{width:72px;height:72px;border-radius:8px;overflow:hidden;background:rgba(0,0,0,.3);
      border:2px solid rgba(255,255,255,.25);position:relative;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .tm-photo img{width:100%;height:100%;object-fit:cover;}
    .tm-photo-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.78);
      font-size:.65rem;font-weight:700;text-align:center;padding:3px 2px;color:#fff;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tm-info{width:100%;text-align:center;}
    .tm-pts{font-size:.68rem;font-weight:700;color:#f59e0b;line-height:1.3;}
    .tm-role{font-size:.6rem;color:rgba(255,255,255,.55);line-height:1.3;}
    .tm-badge-leader{font-size:.55rem;background:rgba(0,0,0,.3);color:rgba(255,255,255,.7);
      border-radius:3px;padding:1px 5px;border:1px solid rgba(255,255,255,.2);display:inline-block;}
    .team-panel-list{display:flex;flex-direction:column;}

    .center-screen{text-align:center;padding:40px 20px;}
    .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface2);
      border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;
      font-size:.86rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;}
    .toast.show{opacity:1;}
  </style>
</head>
<body>

<div class="top-bar">
  <div>
    <div style="font-size:.95rem;font-family:'Pretendard',sans-serif;font-weight:600;color:var(--muted);letter-spacing:0px;margin-bottom:1px;">RØDE와 함께하는</div>
    <div class="logo" onclick="location.href='index.html'" title="메인으로">도현 배 유인원 컵</div>
  </div>
  <div id="role-badge"></div>
</div>

<!-- 대기 -->
<div id="waiting-screen" class="card">
  <div class="center-screen">
    <div style="font-size:2.5rem;margin-bottom:12px;">⏳</div>
    <h3 style="margin-bottom:8px;">경매 시작 대기 중</h3>
    <p style="color:var(--muted);">주최자가 경매를 시작하면 자동으로 시작됩니다</p>
  </div>
</div>

<!-- 경매 진행 -->
<div id="auction-screen" style="display:none;">
  <div class="auction-layout">

    <!-- 왼쪽: 팀 현황 -->
    <div class="left-panel">
      <div class="card" style="padding:12px;">
        <div class="card-title">팀 현황</div>
        <div class="team-panel-list" id="teams-disp"></div>
      </div>
    </div>

    <!-- 가운데: 선수 카드 -->
    <div>
      <div class="player-card" id="player-card">
        <div class="grade-banner grade-고" id="grade-banner"></div>
        <div class="pc-top">
          <div class="pc-photo" id="pc-photo">👤</div>
          <div class="pc-info">
            <div class="pc-grade-badge gb-고" id="pc-grade-badge">🔴 고티어 매물</div>
            <div class="pc-name" id="pc-name">-</div>
            <div id="pc-meta" style="margin-bottom:6px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;"></div>
            <div class="pc-tiers" id="pc-tiers"></div>
            <div class="hero-icon-wrap" id="pc-heroes"></div>
          </div>
        </div>
        <table class="pc-table" id="pc-table"></table>
        <div class="pc-intro" id="pc-intro" style="display:none;"></div>
        <div class="timer-bid-section">
          <div class="bid-row">
            <div>
              <div class="bid-amount" id="bid-amount">0 pt</div>
              <div class="bid-team" id="bid-team">입찰자 없음</div>
            </div>
          </div>
          <div class="timer-bar-wrap">
            <div class="timer-bar tbar-preview" id="timer-bar" style="width:100%"></div>
          </div>
          <div class="timer-bottom">
            <div class="phase-badge pb-preview" id="phase-badge"><span>⏳ 입찰 대기 중</span></div>
            <div class="timer-countdown">
              <div class="timer-big t-preview" id="timer-big">10</div>
              <div class="timer-sec-label">초</div>
            </div>
          </div>
          <div class="bid-locked" id="bid-locked">🔒 잠시 후 입찰이 시작됩니다…</div>
          <div id="bid-section" style="display:none;">
            <div class="my-pts">내 포인트: <span id="my-pts-val">-</span></div>
            <div class="bid-presets" id="bid-presets"></div>
            <div class="custom-bid">
              <input type="number" id="custom-amt" placeholder="직접 입력" min="10" step="10" />
              <button class="btn-bid" onclick="placeBid(null)">입찰</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 카테고리별 경매 순서 -->
    <div class="right-panel">
      <div class="order-section">
        <div class="order-section-title">경매 순서</div>
        <div id="order-by-category"></div>
      </div>
    </div>
  </div>
</div>

<!-- 완료 -->
<div id="finished-screen" class="card" style="display:none;">
  <div class="center-screen">
    <div style="font-size:2.5rem;margin-bottom:12px;">🎉</div>
    <h3 style="margin-bottom:8px;">경매 완료!</h3>
    <p style="color:var(--muted);margin-bottom:18px;">최종 팀 구성</p>
    <div id="final-teams"></div>
  </div>
</div>

  const TEAM_COLORS = [
    {bg:'linear-gradient(135deg,#c2602a,#e8823a)',light:'rgba(200,90,30,.15)'},
    {bg:'linear-gradient(135deg,#7b3fa0,#a85fd4)',light:'rgba(120,60,160,.15)'},

  const params   = new URLSearchParams(location.search);
  const ROOM     = params.get('room');
  const TEAM_KEY = params.get('team');
  const TOKEN    = params.get('token');
  const ROLE     = params.get('role');

  const IS_OBSERVER = ROLE === 'observer';
  const PREVIEW_SEC = 10;
  const BID_SEC     = 10;

  if (!ROOM) { alert('잘못된 접근입니다.'); location.href = 'index.html'; }

  if (IS_OBSERVER) document.getElementById('role-badge').innerHTML = `<span class="badge-obs">👁 관전 중</span>`;

  function startListening() {
    const { ref, onValue, get } = window._dbFns;
    if (IS_LEADER) {
      get(ref(window._db, `rooms/${ROOM}/teams/${TEAM_KEY}/leaderToken`)).then(snap => {
        if (!snap.exists() || snap.val() !== TOKEN) { alert('유효하지 않은 링크입니다.'); location.href='index.html'; }
      });
    }
    onValue(ref(window._db, `rooms/${ROOM}`), snap => {
      if (!snap.exists()) return;
      roomData = snap.val();
      render();
    });
  }

  window.addEventListener('load', () => {
    if (window._db && window._dbFns) {
      checkRoomPwThenStart();
    } else {
      const timer = setInterval(() => {
        if (window._db && window._dbFns) {
          clearInterval(timer);
          checkRoomPwThenStart();
        }
      }, 100);
    }
  });

  // ── 방 비밀번호 검증 후 입장
  async function checkRoomPwThenStart() {
    // 팀장 토큰이 있거나 관전자 역할이면 비밀번호 체크 (관전자도 비번 필요)
    // host는 auction.html에 접근하지 않으므로 모두 검증
    const { ref, get } = window._dbFns;
    try {
      const snap = await get(ref(window._db, `rooms/${ROOM}/meta/roomPw`));
      const pw   = snap.exists() ? snap.val() : '';
      if (!pw) {
        // 비밀번호 없음 → 바로 입장
        startListening();
        return;
      }
      // 세션에 이미 인증된 방이면 스킵
      const sessionKey = `roomAuth_${ROOM}`;
      if (sessionStorage.getItem(sessionKey) === pw) {
        startListening();
        return;
      }
      // 비밀번호 모달 표시
      showPwModal(pw);
    } catch(e) {
      startListening(); // 오류 시 그냥 입장
    }
  }

    overlay.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;
          padding:36px 32px;width:100%;max-width:380px;text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:14px;">🔒</div>
        <div style="font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:var(--accent);margin-bottom:6px;">비밀번호 입력</div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:24px;">이 경매는 비밀번호로 보호되어 있습니다</div>
        <input type="password" id="room-pw-input" placeholder="비밀번호를 입력하세요"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
          color:var(--text);padding:12px 16px;font-size:1rem;font-family:inherit;outline:none;
          text-align:center;letter-spacing:3px;margin-bottom:8px;"
          onkeydown="if(event.key==='Enter')document.getElementById('room-pw-confirm').click()" />
        <div id="room-pw-err" style="color:var(--danger);font-size:.78rem;min-height:18px;margin-bottom:10px;"></div>
        <button id="room-pw-confirm"
          style="width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#d97706);
          border:none;border-radius:10px;color:#0a0e1a;font-weight:700;font-family:inherit;
          font-size:1rem;cursor:pointer;margin-bottom:10px;"
          onclick="(function(){
            const val = document.getElementById('room-pw-input').value;
            if(val === '${correctPw}') {
              sessionStorage.setItem('roomAuth_${ROOM}', '${correctPw}');
              document.getElementById('pw-modal').remove();
              startListening();
            } else {
              const err = document.getElementById('room-pw-err');
              err.textContent = '비밀번호가 틀렸습니다';
              document.getElementById('room-pw-input').value = '';
              document.getElementById('room-pw-input').focus();
              setTimeout(()=>{err.textContent='';},2000);
            }
          })()">입장하기</button>
        <button onclick="location.href='index.html'"
          style="background:none;border:none;color:var(--muted);font-size:.82rem;cursor:pointer;font-family:inherit;">
          ← 메인으로 돌아가기
        </button>
      </div>`;
    document.body.appendChild(overlay);
    setTimeout(() => document.getElementById('room-pw-input')?.focus(), 100);
  }

  function render() {
    if (!roomData) return;
    const { teams, auction } = roomData;
    const st = auction.status;
    if (IS_LEADER && teams[TEAM_KEY])
      document.getElementById('role-badge').innerHTML = `<span class="badge-team">🏅 ${teams[TEAM_KEY].name} 팀장</span>`;
    document.getElementById('waiting-screen').style.display  = st==='waiting'  ? '':'none';
    document.getElementById('auction-screen').style.display  = (st==='preview'||st==='bidding') ? '':'none';
    document.getElementById('finished-screen').style.display = st==='finished' ? '':'none';
    if (st==='preview'||st==='bidding') { renderAuction(); renderTeams(); renderOrderPanel(); }    if (st==='finished') { stopTimer(); renderFinal(); }
  }

  function renderAuction() {
    const { auction, players, teams, meta } = roomData;
    if (!auction.currentPlayer) return;
    const p = players[auction.currentPlayer];
    const isPreview = auction.status === 'preview';
    const grade = p.grade || '고';

    document.getElementById('grade-banner').className = `grade-banner grade-${grade==='고'?'고':'저'}`;
    const gb = document.getElementById('pc-grade-badge');
    gb.className = 'pc-grade-badge ' + (grade==='고'?'gb-고':'gb-저');
    gb.textContent = grade==='고'?'🔴 고티어 매물':'🔵 저티어 매물';

    const photoEl = document.getElementById('pc-photo');
    if (p.photo) { photoEl.innerHTML = `<img src="${p.photo}" />`; }
    else { photoEl.innerHTML = '👤'; }

    document.getElementById('pc-name').textContent = p.name;

    // 포지션 + 스타일 인라인으로 이름 아래에
    const metaHtml = [
      p.role  ? `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 9px;font-size:.75rem;margin-right:5px;">${p.role}</span>` : '',
      p.style ? `<span style="color:var(--muted);font-size:.78rem;">${p.style}</span>` : '',
    ].join('');
    const metaEl = document.getElementById('pc-meta');
    if (metaEl) metaEl.innerHTML = metaHtml;

    document.getElementById('pc-tiers').innerHTML = `
      <div class="tier-item"><div class="tier-label">현재 티어</div><div class="tier-val">${p.curTier||'-'}</div></div>
      <div class="tier-item"><div class="tier-label">전 시즌</div><div class="tier-val">${p.prevTier||'-'}</div></div>
      <div class="tier-item"><div class="tier-label">역대 최고</div><div class="tier-val" style="color:var(--accent)">${p.peakTier||'-'}</div></div>
    `;

    document.getElementById('pc-heroes').innerHTML = renderHeroes([p.hero1,p.hero2,p.hero3]);

    // 테이블은 비워둠 (위에서 처리)
    document.getElementById('pc-table').innerHTML = '';

    const introEl = document.getElementById('pc-intro');
    if (p.intro) { introEl.textContent = `💬 ${p.intro}`; introEl.style.display=''; }
    else { introEl.style.display='none'; }

    document.getElementById('bid-amount').textContent = `${auction.currentBid||0} pt`;
    document.getElementById('bid-team').textContent = auction.currentLeader
      ? `👑 ${teams[auction.currentLeader]?.name} 입찰 중` : '입찰자 없음';

    const pb = document.getElementById('phase-badge');
    const lockedEl = document.getElementById('bid-locked');
    const bidSec   = document.getElementById('bid-section');

    if (auction.paused) {
      pb.className = 'phase-badge';
      pb.style.cssText = 'background:rgba(245,158,11,.1);border:1px solid var(--accent);color:var(--accent);display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:.8rem;font-weight:700;';
      pb.innerHTML = '<span>⏸ 일시정지 중</span>';
      lockedEl.style.display = '';
      lockedEl.textContent = '⏸ 경매가 일시정지되었습니다';
      bidSec.style.display = 'none';
      stopTimer();
    } else if (isPreview) {
      pb.className = 'phase-badge pb-preview';
      pb.style.cssText = '';
      pb.innerHTML = '<span>⏳ 입찰 대기 중</span>';
      lockedEl.style.display = '';
      lockedEl.textContent = '🔒 잠시 후 입찰이 시작됩니다…';
      bidSec.style.display   = 'none';
    } else {
      pb.className = 'phase-badge pb-bidding';
      pb.style.cssText = '';
      pb.innerHTML = '<span class="dot"></span><span>입찰 중</span>';
      lockedEl.style.display = 'none';
      if (IS_LEADER) {
        bidSec.style.display = '';
        const myPts  = teams[TEAM_KEY]?.points || 0;
        const curBid = auction.currentBid || 0;
        const minBid = meta.minBid || 10;
        document.getElementById('my-pts-val').textContent = `${myPts}pt`;
        const presets = [
          {l:`+${minBid}`,v:curBid+minBid},
          {l:`+${minBid*2}`,v:curBid+minBid*2},
          {l:`+${minBid*5}`,v:curBid+minBid*5},
          {l:`최대`,v:myPts}
        ];
        document.getElementById('bid-presets').innerHTML = presets.map(pr=>{
          const dis=(pr.v>myPts||pr.v<=curBid)?'disabled':'';
          return `<button class="bid-btn" ${dis} onclick="placeBid(${pr.v})">${pr.l}<br><span style="font-size:.68rem;font-weight:400;">${pr.v}pt</span></button>`;
        }).join('');
      } else { bidSec.style.display='none'; }
    }
    if (!auction.paused) {
      startLocalTimer(auction.timerEndsAt, isPreview ? PREVIEW_SEC : BID_SEC, isPreview);

  // 오른쪽 경매 순서 패널
  function renderOrderPanel() {
    const { auction, players } = roomData;
    const order = auction.order || [];
    const curPid = auction.currentPlayer;

    // 카테고리별 그룹핑: 딜러→탱커→힐러, 고→저
    const ROLE_ORDER = ['딜러','탱커','힐러'];
    const groups = {};
    order.forEach(pid => {
      const p = players[pid];
      if (!p) return;
      const key = `${p.grade||'고'}_${p.role||''}`;
      if (!groups[key]) groups[key] = { grade: p.grade||'고', role: p.role||'', players: [] };
      groups[key].players.push({ pid, p });
    });

    // 정렬: 딜러→탱커→힐러, 고→저
    const sorted = Object.values(groups).sort((a,b) => {
      const rA = ROLE_ORDER.indexOf(a.role), rB = ROLE_ORDER.indexOf(b.role);
      if (rA !== rB) return rA - rB;
      return a.grade === '고' ? -1 : 1;
    });

    document.getElementById('order-by-category').innerHTML = sorted.map(g => {
      const isDoneGroup = g.players.every(({p}) => p.assignedTo != null);
      const gradeColor = g.grade === '고' ? '#ef4444' : '#3b82f6';
      const gradeBg    = g.grade === '고' ? 'rgba(239,68,68,.15)' : 'rgba(59,130,246,.15)';
      const playerCards = g.players.map(({pid, p}) => {
        const isCur   = pid === curPid;
        const isDone  = p.assignedTo != null;
        const photoInner = p.photo
          ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;" />`
          : `<span style="font-size:1.1rem;">👤</span>`;
        const teamName = isDone ? (roomData.teams[p.assignedTo]?.name || '') : '';
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;opacity:${isDone?'.4':'1'};">
          <div style="width:52px;height:52px;border-radius:7px;overflow:hidden;background:var(--surface2);
            border:2px solid ${isCur ? '#f59e0b' : 'var(--border)'};
            ${isCur ? 'box-shadow:0 0 10px rgba(245,158,11,.7);' : ''}
            display:flex;align-items:center;justify-content:center;
            ${isDone ? 'filter:grayscale(1);' : ''}">${photoInner}</div>
          <div style="font-size:.6rem;color:var(--text);max-width:56px;text-align:center;
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
            ${isDone ? 'text-decoration:line-through;' : ''}">${p.name}</div>
          ${isDone ? `<div style="font-size:.55rem;color:var(--success);">▸ ${teamName}</div>` : ''}
        </div>`;
      }).join('');

      return `<div style="margin-bottom:12px;${isDoneGroup?'opacity:.5':''}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
          <span style="font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;
            background:${gradeBg};color:${gradeColor};border:1px solid ${gradeColor};">
            ${g.grade==="고"?"고티어":"저티어"} ${g.role}
          </span>
          <span style="font-size:.65rem;color:var(--muted);">${g.players.filter(({p})=>p.assignedTo==null).length}명 남음</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${playerCards}</div>
      </div>`;
    }).join('');
  }

  function startLocalTimer(timerEndsAt, totalSec, isPreview) {
    stopTimer();
    timerInterval = setInterval(() => {
      const remMs  = timerEndsAt - Date.now();
      const remSec = Math.max(0, remMs / 1000);
      const pct    = Math.min(100, (remSec / totalSec) * 100);
      const ceil   = Math.ceil(remSec);
      const bigEl  = document.getElementById('timer-big');
      const barEl  = document.getElementById('timer-bar');
      if (!bigEl) return;
      bigEl.textContent = remSec.toFixed(1);
      barEl.style.width = pct + '%';
      if (isPreview) {
        bigEl.className = 'timer-big t-preview'; barEl.className = 'timer-bar tbar-preview';
      } else if (ceil <= 5) {
        bigEl.className = 'timer-big t-urgent'; barEl.className = 'timer-bar tbar-urgent';
      } else {
        bigEl.className = 'timer-big t-normal'; barEl.className = 'timer-bar tbar-bid';
      }
      if (remMs <= 0) stopTimer();
    }, 50);
  }
  function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

  async function placeBid(amount) {
    const { ref, update } = window._dbFns;
    const { auction, teams, meta } = roomData;
    if (auction.status !== 'bidding') { showToast('아직 입찰할 수 없습니다'); return; }
    let amt = amount ?? parseInt(document.getElementById('custom-amt').value);
    if (isNaN(amt)) { showToast('금액을 입력해주세요'); return; }
    const curBid = auction.currentBid || 0;
    const myPts  = teams[TEAM_KEY]?.points || 0;
    const minBid = meta.minBid || 10;
    if (amt > myPts)                             { showToast('포인트가 부족합니다'); return; }
    if (amt <= curBid)                            { showToast(`${curBid}pt보다 높아야 합니다`); return; }
    if ((amt-curBid)<minBid && amt!==myPts)       { showToast(`최소 ${minBid}pt 이상 올려야 합니다`); return; }
    const remaining = Math.max(0, auction.timerEndsAt - Date.now());
    const newEnd    = Math.min(Date.now()+remaining+BID_ADD_SEC*1000, Date.now()+BID_SEC*1000);
    await update(ref(window._db, `rooms/${ROOM}/auction`), {
      currentBid:amt, currentLeader:TEAM_KEY, timerEndsAt:newEnd
    });
    showToast(`✅ ${amt}pt 입찰! (+${BID_ADD_SEC}초)`);
    document.getElementById('custom-amt').value = '';
  }

  function renderTeams() {
    const { teams, players, auction, meta } = roomData;
    const maxSlots  = (meta.membersPerTeam || 6) - 1; // 팀원 수 (팀장 제외)
    const logMap    = {};
    (auction.log || []).forEach(e => { logMap[e.pid] = e.price; });

    document.getElementById('teams-disp').innerHTML = Object.entries(teams).map(([k,t], idx) => {
      const isMine    = k === TEAM_KEY;
      const isLeading = k === auction.currentLeader;
      const color     = TEAM_COLORS[idx % TEAM_COLORS.length];
      const members   = t.members || [];

      // ── 팀장 카드
      const leaderPhotoInner = t.photo
        ? `<img src="${t.photo}" />`
        : `<span style="font-size:1.6rem;">👤</span>`;
      const leaderCard = `<div class="tm-card">
        <div class="tm-photo">
          ${leaderPhotoInner}
          <div class="tm-photo-name">${t.name}</div>
        </div>
        <div class="tm-info">
          <div class="tm-badge-leader">팀장</div>
        </div>
      </div>`;

      // ── 팀원 카드들 (뽑힌 것 + 빈 자리)
      const memberCards = Array.from({length: maxSlots}, (_, i) => {
        const pid = members[i];
        const p   = pid ? players[pid] : null;
        if (p) {
          const gradeColor = p.grade === '고' ? '#ef4444' : '#3b82f6';
          const gradeTxt   = p.grade === '고' ? '🔴 고' : '🔵 저';
          const price      = logMap[pid] != null ? `${logMap[pid]}pt` : '';
          const photoInner = p.photo
            ? `<img src="${p.photo}" />`
            : `<span style="font-size:1.4rem;">👤</span>`;
          return `<div class="tm-card">
            <div class="tm-photo">
              ${photoInner}
              <div class="tm-photo-name">${p.name}</div>
            </div>
            <div class="tm-info">
              ${price ? `<div class="tm-pts">${price}</div>` : ''}
              <div class="tm-role" style="color:${gradeColor};">${gradeTxt} ${p.role||''}</div>
            </div>
          </div>`;
        }
        // 빈 자리
        return `<div class="tm-card empty">
          <div class="tm-photo">
            <span style="font-size:1.4rem;opacity:.2;">+</span>
          </div>
        </div>`;
      }).join('');

      return `<div class="team-panel${isMine?' mine':''}${isLeading?' leading':''}"
          style="background:${color.light};border-color:${isMine?'rgba(255,255,255,.5)':isLeading?'#f59e0b':'transparent'}">
        <div class="team-panel-header" style="background:${color.bg};">
          <div class="team-panel-name">TEAM ${t.name}${isMine?' 👑':''}</div>
          <div class="team-panel-pts">${t.points}<span>pt</span></div>
        </div>
        <div class="team-members-grid">
          ${leaderCard}
          ${memberCards}
        </div>
      </div>`;
    }).join('');
  }

  function renderFinal() {
    const { teams, players, meta, auction } = roomData;
    const maxSlots = (meta.membersPerTeam || 6) - 1;
    const logMap = {};
    (auction.log || []).forEach(e => { logMap[e.pid] = e.price; });

    document.getElementById('final-teams').innerHTML = Object.entries(teams).map(([k,t], idx) => {
      const color   = TEAM_COLORS[idx % TEAM_COLORS.length];
      const members = t.members || [];

      // ── 팀장 카드
      const leaderPhotoEl = t.photo
        ? `<img src="${t.photo}" style="width:100%;height:100%;object-fit:cover;" />`
        : `<span style="font-size:1.8rem;">👤</span>`;
      const leaderCard = `
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
          <div style="width:80px;height:80px;border-radius:10px;overflow:hidden;
            background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.4);
            display:flex;align-items:center;justify-content:center;flex-shrink:0;">${leaderPhotoEl}</div>
          <div style="font-size:.88rem;font-weight:700;color:#fff;text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.name}</div>
          <div style="font-size:.62rem;background:rgba(0,0,0,.3);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:1px 7px;">팀장</div>
        </div>`;

      // ── 팀원 카드들
      const memberCards = members.map(pid => {
        const p = players[pid];
        if (!p) return '';
        const gradeColor = p.grade === '고' ? '#ef4444' : '#3b82f6';
        const price      = logMap[pid] != null ? `${logMap[pid]}pt` : '';
        const photoEl    = p.photo
          ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;" />`
          : `<span style="font-size:1.8rem;">👤</span>`;
        return `
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
            <div style="width:80px;height:80px;border-radius:10px;overflow:hidden;
              background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.2);
              display:flex;align-items:center;justify-content:center;flex-shrink:0;">${photoEl}</div>
            <div style="font-size:.88rem;font-weight:700;color:#fff;text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
              ${price ? `<span style="font-size:.72rem;font-weight:700;color:#f59e0b;">${price}</span>` : ''}
              <span style="font-size:.62rem;font-weight:700;color:${gradeColor};">${p.grade==='고'?'🔴':'🔵'} ${p.role||''}</span>
            </div>
          </div>`;
      }).join('');

      return `
        <div style="background:${color.light};border-radius:14px;overflow:hidden;
            border:2px solid rgba(255,255,255,.08);margin-bottom:16px;">
          <div style="background:${color.bg};display:flex;align-items:center;justify-content:space-between;padding:10px 18px;">
            <div style="font-size:1rem;font-weight:800;color:#fff;letter-spacing:.5px;">TEAM ${t.name}</div>
            <div style="font-size:.88rem;font-weight:700;color:rgba(255,255,255,.9);">${t.points}pt 잔여</div>
          </div>
          <div style="padding:16px 18px;">
            <div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:flex-start;">
              ${leaderCard}
              ${memberCards}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }
</script>
</body>
</html>

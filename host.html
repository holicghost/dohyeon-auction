<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주최자 - OW 경매</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <script type="module">

      authDomain: "dohyeon-4e4e0.firebaseapp.com",
      databaseURL: "https://dohyeon-4e4e0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "dohyeon-4e4e0",
      storageBucket: "dohyeon-4e4e0.firebasestorage.app",
      messagingSenderId: "231075336771",
      appId: "1:231075336771:web:6a111f7c1aa9a2ae4a3af6",

    };
    const app = initializeApp(firebaseConfig);
    window._db = getDatabase(app);
    window._dbFns = { ref, onValue, update };
  </script>
  <style>
    :root{
      --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e3a5f;
      --accent:#f59e0b;--accent2:#3b82f6;--text:#e2e8f0;--muted:#64748b;
      --danger:#ef4444;--success:#22c55e;--preview:#818cf8;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;letter-spacing:-0.03em;
      min-height:100vh;padding:16px;
      background-image:radial-gradient(ellipse at 20% 50%,rgba(59,130,246,.06) 0%,transparent 60%),
                       radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.06) 0%,transparent 60%);}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
    .logo{font-family:'Pretendard',sans-serif;font-weight:900;font-size:1.8rem;letter-spacing:-1px;color:#f59e0b;cursor:pointer;}
    .room-pill{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      padding:7px 14px;font-size:.82rem;color:var(--muted);}
    .room-pill span{color:var(--accent);font-weight:700;letter-spacing:3px;}
    .copy-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;
      padding:4px 10px;font-size:.72rem;cursor:pointer;font-family:inherit;margin-left:8px;transition:all .2s;}
    .copy-btn:hover{border-color:var(--accent2);color:var(--accent2);}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:720px){.grid2{grid-template-columns:1fr;}}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
    .card-title{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
    .full{grid-column:1/-1;}

    /* ── 선수 카드 (레퍼런스 스타일) ── */
    .player-card{
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      border:1px solid var(--border);border-radius:14px;padding:20px;
      position:relative;overflow:hidden;
    }
    .player-card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(245,158,11,.05),transparent 60%);pointer-events:none;
    }
    /* 등급 배너 */
    .grade-banner{
      position:absolute;top:0;left:0;right:0;height:4px;
    }
    .grade-고{background:linear-gradient(90deg,#ef4444,#f97316);}
    .grade-저{background:linear-gradient(90deg,#3b82f6,#6366f1);}
    .

    .pc-top{display:flex;gap:16px;align-items:flex-start;margin-top:8px;}
    .pc-photo{width:140px;height:140px;border-radius:12px;background:var(--surface2);
      border:2px solid var(--border);flex-shrink:0;overflow:hidden;
      display:flex;align-items:center;justify-content:center;font-size:3rem;}
    .pc-info{flex:1;min-width:0;}
    /* 등급/포지션 배지 - 완전히 동일한 높이/크기 */
    .pc-grade-badge, .pc-role-badge{
      display:inline-flex;align-items:center;gap:4px;
      padding:4px 11px;border-radius:5px;font-size:.75rem;font-weight:700;
      line-height:1;height:24px;box-sizing:border-box;}
    .gb-고{background:rgba(239,68,68,.2);color:#ef4444;border:1px solid #ef4444;}
    .gb-저{background:rgba(59,130,246,.2);color:#3b82f6;border:1px solid #3b82f6;}
    .rb-딜러{background:rgba(249,115,22,.2);color:#f97316;border:1px solid #f97316;}
    .rb-탱커{background:rgba(59,130,246,.2);color:#3b82f6;border:1px solid #3b82f6;}
    .rb-힐러{background:rgba(34,197,94,.2);color:#22c55e;border:1px solid #22c55e;}
    .rb-유동{background:rgba(168,85,247,.2);color:#a855f7;border:1px solid #a855f7;}
    .
    .pc-name{font-family:'Black Han Sans',sans-serif;font-size:2.3rem;line-height:1.1;margin-bottom:7px;}
    .pc-tiers{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:7px;}
    .tier-item{display:flex;flex-direction:column;gap:2px;}
    .tier-label{font-size:.65rem;color:var(--muted);}
    .tier-val{font-size:.85rem;font-weight:700;color:var(--text);}
    .pc-heroes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
    .hero-tag{background:var(--surface2);border:1px solid var(--border);
      border-radius:6px;padding:3px 8px;font-size:.75rem;color:var(--text);}
    .pc-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.78rem;margin-bottom:6px;align-items:center;}
    .pc-meta-item{display:flex;flex-direction:column;gap:2px;}
    .pc-meta-label{font-size:.65rem;color:var(--muted);}
    .pc-meta-val{color:var(--text);}
    .pc-intro{margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.04);
      border-radius:8px;font-size:.82rem;color:var(--muted);border-left:3px solid var(--accent);}

    /* ── 타이머 섹션 (레퍼런스 스타일) ── */
    .timer-section{margin-top:16px;}
    .bid-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .bid-amount{font-family:'Black Han Sans',sans-serif;font-size:2rem;color:var(--accent);}
    .bid-team{font-size:.85rem;color:var(--accent2);}

    /* 타이머 바 (레퍼런스와 동일) */
    .timer-bar-wrap{width:100%;height:10px;background:var(--surface2);border-radius:6px;overflow:hidden;margin-bottom:10px;}
    .timer-bar{height:100%;border-radius:6px;transition:width .1s linear,background .3s;}
    .tbar-preview{background:linear-gradient(90deg,var(--preview),#a78bfa);}
    .tbar-bid{background:linear-gradient(90deg,var(--accent),#f97316);}
    .tbar-urgent{background:linear-gradient(90deg,var(--danger),#f97316);animation:flicker .4s infinite;}
    @keyframes flicker{0%,100%{opacity:1}50%{opacity:.7}}

    /* 타이머 하단 행 */
    .timer-bottom{display:flex;align-items:center;justify-content:space-between;}
    .phase-badge{display:inline-flex;align-items:center;gap:6px;
      padding:5px 14px;border-radius:20px;font-size:.8rem;font-weight:700;}
    .pb-preview{background:rgba(129,140,248,.15);color:var(--preview);border:1px solid var(--preview);}
    .pb-bidding{background:rgba(245,158,11,.15);color:var(--accent);border:1px solid var(--accent);}
    .pb-bidding .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse-dot .8s infinite;}
    @keyframes pulse-dot{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
    .timer-countdown{display:flex;align-items:baseline;gap:4px;}
    .timer-big{font-family:'Black Han Sans',sans-serif;font-size:2.8rem;line-height:1;transition:color .2s;}
    .timer-sec-label{font-size:.78rem;color:var(--muted);}
    .t-preview{color:var(--preview);}
    .t-normal{color:var(--text);}
    .t-urgent{color:var(--danger);animation:pulse-text .5s infinite;}
    @keyframes pulse-text{0%,100%{opacity:1}50%{opacity:.4}}

    /* 영웅 아이콘 */
    .hero-icon-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
    .hero-icon{width:46px;height:46px;border-radius:8px;overflow:hidden;border:2px solid var(--border);
      background:var(--surface2);flex-shrink:0;position:relative;}
    .hero-icon img{width:100%;height:100%;object-fit:cover;}
    .hero-icon-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);
      font-size:.5rem;text-align:center;padding:1px 2px;color:#fff;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;}
    .hero-tag{background:var(--surface2);border:1px solid var(--border);
      border-radius:6px;padding:3px 8px;font-size:.75rem;color:var(--text);}

      border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;gap:10px;}
    .next-label{font-size:.75rem;color:var(--danger);font-weight:700;letter-spacing:1px;flex-shrink:0;}
    .next-grade-badge{padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:700;flex-shrink:0;}
    .next-name{font-size:.95rem;font-weight:700;}
    .next-role{font-size:.75rem;color:var(--muted);margin-left:auto;flex-shrink:0;}

    /* 버튼 */
    .btn{padding:10px 18px;border:none;border-radius:10px;font-size:.9rem;font-weight:700;
      font-family:inherit;cursor:pointer;transition:all .2s;}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#d97706);color:#0a0e1a;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,158,11,.4);}
    .btn-danger{background:var(--danger);color:#fff;}
    .btn-danger:hover{opacity:.85;}
    .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .btn-ghost:hover{border-color:var(--accent2);}
    .btn:disabled{opacity:.35;pointer-events:none;}
    .btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;}

    /* 팀 패널 */
    .team-panel{border-radius:14px;overflow:hidden;border:2px solid transparent;margin-bottom:10px;transition:border-color .3s;}
    .team-panel.leading{border-color:#f59e0b;box-shadow:0 0 14px rgba(245,158,11,.4);}
    .team-panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 6px;}
    .team-panel-name{font-size:.78rem;font-weight:800;color:rgba(255,255,255,.9);letter-spacing:.5px;}
    .team-panel-pts{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:rgba(255,255,255,.95);}
    .team-panel-pts span{font-size:.6rem;font-family:'Pretendard',sans-serif;font-weight:400;opacity:.7;margin-left:2px;}
    .team-panel-body{display:flex;align-items:flex-start;gap:8px;padding:8px 12px 12px;}
    .team-leader-box{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
    .team-leader-photo{width:56px;height:56px;border-radius:8px;background:rgba(0,0,0,.25);
      border:2px solid rgba(255,255,255,.3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
    .team-leader-photo img{width:100%;height:100%;object-fit:cover;}
    .team-leader-name{font-size:.65rem;color:rgba(255,255,255,.85);font-weight:700;
      max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .team-leader-badge{font-size:.55rem;background:rgba(0,0,0,.3);color:rgba(255,255,255,.7);
      border-radius:4px;padding:1px 5px;border:1px solid rgba(255,255,255,.2);}
    .team-slots{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;flex:1;}
    .team-slot{background:rgba(0,0,0,.2);border-radius:6px;aspect-ratio:1;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,.1);overflow:hidden;position:relative;}
    .team-slot.filled{background:rgba(0,0,0,.15);}
    .team-slot-photo{width:100%;height:100%;object-fit:cover;}
    .team-slot-num{font-size:.9rem;color:rgba(255,255,255,.25);font-weight:700;}
    .team-slot-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.75);
      font-size:.6rem;font-weight:700;text-align:center;padding:2px 3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .team-slot-grade{position:absolute;top:2px;left:2px;font-size:.55rem;line-height:1;}

    /* 팀 그리드 (레거시) */

    /* 낙찰 로그 */
    .log-wrap{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
    .log-wrap::-webkit-scrollbar{width:3px;}
    .log-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .log-item{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface2);
      border-radius:6px;font-size:.78rem;}
    .log-team{color:var(--accent2);font-weight:700;min-width:56px;}
    .log-player{color:var(--text);flex:1;}
    .log-role{font-size:.65rem;color:var(--muted);}
    .log-price{color:var(--accent);font-weight:700;font-family:'Black Han Sans',sans-serif;}

    /* 큐 */
    .q-list{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;}
    .q-list::-webkit-scrollbar{width:3px;}
    .q-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .qi{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;
      background:var(--surface2);border:1px solid transparent;}
    .qi.cur{border-color:var(--accent);background:rgba(245,158,11,.08);}
    .qi.done{opacity:.3;text-decoration:line-through;}
    .qi-grade{font-size:.68rem;font-weight:700;flex-shrink:0;}
    .qi-grade-고{color:#ef4444;} .qi-grade-저{color:#3b82f6;} 
    .qi-role{font-size:.8rem;color:var(--muted);min-width:32px;}
    .qi-name{font-size:.95rem;}
    .qi-team{font-size:.72rem;color:var(--success);margin-left:auto;}

    /* 링크 */
    .lk{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);
      border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
    .lk-label{font-size:.75rem;color:var(--muted);min-width:58px;}
    .lk-url{font-size:.75rem;color:var(--accent2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);
    /* ── 포지션 전환 오버레이 */
    .break-overlay{position:fixed;inset:0;z-index:500;background:rgba(10,14,26,.92);
      backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
    .break-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
      padding:40px 48px;text-align:center;max-width:480px;width:90%;}
    .break-title{font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:var(--text);margin-bottom:6px;}
    .break-sub{font-size:.9rem;color:var(--muted);margin-bottom:28px;}
    .break-next{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:var(--accent);margin-bottom:24px;}
    .break-count{font-family:'Black Han Sans',sans-serif;font-size:5rem;line-height:1;margin-bottom:24px;transition:color .3s;}
    .break-count.urgent{color:var(--danger);animation:bc-pulse .4s infinite;}
    @keyframes bc-pulse{0%,100%{opacity:1}50%{opacity:.4}}
      border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;
      font-size:.88rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;}
    .toast.show{opacity:1;}
    /* ── 3컬럼 레이아웃 ── */
    .main-layout{display:grid;grid-template-columns:280px 1fr 260px;gap:12px;align-items:start;}
    @media(max-width:1100px){.main-layout{grid-template-columns:240px 1fr 220px;}}
    @media(max-width:820px){.main-layout{grid-template-columns:1fr;}}
    .side-panel{display:flex;flex-direction:column;gap:12px;}

    #init-screen{text-align:center;padding:28px 0;}
    #init-screen p{color:var(--muted);font-size:.85rem;margin-bottom:20px;}
  </style>
</head>
<body>

<div class="top-bar">
  <div>
    <div style="font-size:1rem;font-family:'Pretendard',sans-serif;font-weight:600;color:var(--muted);letter-spacing:0px;margin-bottom:2px;">RØDE와 함께하는</div>
    <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;" title="메인으로">도현 배 유인원 컵</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span class="room-pill">방 코드: <span id="room-code-disp">-</span></span>
    <button class="copy-btn" onclick="copyObs()">👁 관전링크 복사</button>
    <button class="copy-btn" onclick="goAdmin()" style="border-color:var(--accent);color:var(--accent);">⚙ 관리자</button>
  </div>
</div>

<!-- 시작 전 (레이아웃 밖) -->
<div id="init-wrap" class="card" style="margin-bottom:14px;">
  <div id="init-screen">
    <h3 style="margin-bottom:8px;font-size:1.6rem;">경매 준비 완료</h3>
    <p id="lottery-status-msg" style="margin-bottom:20px;color:var(--muted);font-size:1rem;">시작 버튼을 누르면 팀장 순서를 추첨합니다</p>

    <!-- 추첨 결과 슬롯 -->
    <div id="lottery-slots" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;min-height:90px;align-items:center;">
      <div style="color:var(--muted);font-size:.85rem;">데이터 로딩 중...</div>
    </div>

    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="start-btn" onclick="startWithLottery()">🎲 팀장 순서 추첨</button>
      <button class="btn btn-ghost" id="retry-btn" onclick="retryLottery()"
        style="display:none;">🔄 다시 뽑기</button>
      <button class="btn btn-primary" id="begin-auction-btn" onclick="startAuctionWithCountdown()"
        style="display:none;background:linear-gradient(135deg,#22c55e,#16a34a);">🏁 경매 시작!</button>
    </div>
  </div>
</div>

<!-- 경매 진행 + 완료: 3컬럼 -->
<div class="main-layout" id="main-layout" style="display:none;">

  <!-- 왼쪽: 팀 현황 -->
  <div class="side-panel">
    <div class="card" style="padding:14px;">
      <div class="card-title">팀 현황</div>
      <div id="teams-disp"></div>
    </div>
    <!-- 참가 링크 -->
    <div class="card" style="padding:14px;">
      <div class="card-title">참가 링크</div>
      <div id="links-disp"></div>
      <div class="lk">
        <span class="lk-label">관전</span>
        <span class="lk-url" id="obs-link">-</span>
        <button class="copy-btn" onclick="copyObsEl()">복사</button>
      </div>
    </div>
  </div>

  <!-- 가운데: 현재 경매 -->
  <div>
    <div class="card" id="auction-center">

      <!-- 경매 진행 -->
      <div id="auction-screen">
        <div class="player-card" id="player-card">
          <div class="grade-banner grade-고" id="grade-banner"></div>
          <div class="pc-top">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;">
              <div class="pc-photo" id="pc-photo">👤</div>
              <div class="hero-icon-wrap" id="pc-heroes" style="justify-content:center;margin-bottom:0;"></div>
            </div>
            <div class="pc-info">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
                <div class="pc-grade-badge gb-고" id="pc-grade-badge">🔴 고티어</div>
                <div class="pc-role-badge" id="pc-role-badge"></div>
              </div>
              <div class="pc-name" id="pc-name">-</div>
              <div id="pc-meta" style="margin-bottom:6px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;"></div>
              <div class="pc-tiers" id="pc-tiers"></div>
            </div>
          </div>
          <div class="pc-intro" id="pc-intro" style="display:none;"></div>

          <div class="timer-section">
            <div class="bid-row">
              <div>
                <div class="bid-amount" id="bid-amount">0 pt</div>

  const params = new URLSearchParams(location.search);

  function startListening() {
    const { ref, onValue } = window._dbFns;
    onValue(ref(window._db, `rooms/${ROOM}`), snap => {

      roomData = snap.val();
      render();
    });
    initHostChat();

  // Firebase module이 load보다 늦을 수 있으므로 polling으로 대기
  window.addEventListener('load', () => {
    if (window._db && window._dbFns) {
      startListening();
    } else {
      const timer = setInterval(() => {
        if (window._db && window._dbFns) {
          clearInterval(timer);
          startListening();
        }
      }, 100);
    }
  });

  // ── 렌더
  function render() {
    if (!roomData) return;
    const st = roomData.auction.status;
    document.getElementById('init-wrap').style.display        = st==='waiting' ? '' : 'none';
    document.getElementById('main-layout').style.display      = st==='waiting' ? 'none' : 'grid';
    document.getElementById('auction-screen').style.display   = (st==='preview'||st==='bidding') ? '' : 'none';
    document.getElementById('finished-screen').style.display  = st==='finished' ? '' : 'none';
    if (st==='waiting') { renderLotterySlots(); }
    if (st==='preview'||st==='bidding') renderAuction();
    if (st==='finished') stopTimer();
    renderTeams(); renderQueue(); renderLinks(); renderLog();
  }

  function renderAuction() {
    const { auction, players, teams, meta } = roomData;
    if (!auction.currentPlayer) return;
    const p = players[auction.currentPlayer];
    const isPreview = auction.status === 'preview';
    const grade = p.grade || '고';

    document.getElementById('grade-banner').className = `grade-banner grade-${grade==='고'?'고':'저'}`;
    const gb = document.getElementById('pc-grade-badge');
    gb.className = 'pc-grade-badge ' + (grade==='고'?'gb-고':'gb-저');
    gb.textContent = grade==='고'?'🔴 고티어':'🔵 저티어';

    // 포지션 배지
    const roleClassMap = {'딜러':'rb-딜러','탱커':'rb-탱커','힐러':'rb-힐러','유동':'rb-유동'};
    const rb = document.getElementById('pc-role-badge');
    if (rb && p.role) {
      rb.className = 'pc-role-badge ' + (roleClassMap[p.role]||'rb-유동');
      rb.textContent = p.role;
    } else if (rb) { rb.textContent = ''; }

    const photoEl = document.getElementById('pc-photo');
    if (p.photo) { photoEl.innerHTML = `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;" />`; }
    else { photoEl.innerHTML = '👤'; }

    document.getElementById('pc-name').textContent = p.name;

    // 스타일
    const metaEl = document.getElementById('pc-meta');
    if (metaEl) metaEl.innerHTML = p.style
      ? `<span style="color:var(--muted);font-size:.78rem;">${p.style}</span>` : '';

    document.getElementById('pc-tiers').innerHTML = `
      <div class="tier-item"><div class="tier-label">현재 티어</div><div class="tier-val">${p.curTier||'-'}</div></div>
      <div class="tier-item"><div class="tier-label">전 시즌</div><div class="tier-val">${p.prevTier||'-'}</div></div>
      <div class="tier-item"><div class="tier-label">역대 최고</div><div class="tier-val" style="color:var(--accent)">${p.peakTier||'-'}</div></div>
    `;

    document.getElementById('pc-heroes').innerHTML = renderHeroes([p.hero1,p.hero2,p.hero3]);

    const introEl = document.getElementById('pc-intro');
    if (p.intro) { introEl.textContent = `💬 ${p.intro}`; introEl.style.display=''; }
    else { introEl.style.display='none'; }

    document.getElementById('bid-amount').textContent = `${auction.currentBid||0} pt`;
    document.getElementById('bid-team').textContent = auction.currentLeader
      ? `👑 ${getTeamName(auction.currentLeader)} 입찰 중` : '입찰자 없음';

    // 낙찰 버튼
    document.getElementById('hammer-btn').disabled = isPreview;

    // 일시정지 버튼 상태 반영
    const pauseBtn = document.getElementById('pause-btn');
    if (pauseBtn) {
      const isPaused = auction.paused || false;
      pauseBtn.textContent = isPaused ? '▶ 재개' : '⏸ 일시정지';
      pauseBtn.style.background = isPaused ? 'rgba(34,197,94,.15)' : 'rgba(245,158,11,.15)';
      pauseBtn.style.borderColor = isPaused ? 'var(--success)' : 'var(--accent)';
      pauseBtn.style.color       = isPaused ? 'var(--success)' : 'var(--accent)';
    }

    // 페이즈 배지
    const pb = document.getElementById('phase-badge');
    if (auction.paused) {
      pb.className = 'phase-badge';
      pb.style.cssText = 'background:rgba(245,158,11,.1);border:1px solid var(--accent);color:var(--accent);';
      pb.innerHTML = '<span>⏸ 일시정지 중</span>';
      stopTimer();
    } else if (isPreview) {
      pb.className = 'phase-badge pb-preview';
      pb.style.cssText = '';
      pb.innerHTML = '<span>⏳ 입찰 대기 중</span>';
    } else {
      pb.className = 'phase-badge pb-bidding';
      pb.style.cssText = '';
      pb.innerHTML = '<span class="dot"></span><span>입찰 중</span>';
    }

    if (!auction.paused) {
      startLocalTimer(auction.timerEndsAt, isPreview ? PREVIEW_SEC : BID_SEC, isPreview);
    }

    // NEXT 선수
    renderNext();
  }

  function renderNext() {
    const { auction, players } = roomData;
    const remaining = (auction.order||[]).filter(pid =>
      pid !== auction.currentPlayer && players[pid]?.assignedTo == null
    );
    const nextEl = document.getElementById('next-section');
    if (remaining.length === 0) { nextEl.style.display = 'none'; return; }
    nextEl.style.display = '';
    const np = players[remaining[0]];
    const g  = np?.grade || '중';
    const ngb = document.getElementById('next-grade-badge');
    ngb.textContent = g==='고'?'🔴 고티어':'🔵 저티어';
    ngb.className = 'next-grade-badge ' + (g==='고'?'gb-고':'gb-저');
    document.getElementById('next-name').textContent = np?.name || '-';
    document.getElementById('next-role').textContent = np?.role || '-';
  }

  // ── 타이머
  function startLocalTimer(timerEndsAt, totalSec, isPreview) {
    stopTimer();
    timerInterval = setInterval(() => {
      const remMs  = timerEndsAt - Date.now();
      const remSec = Math.max(0, remMs / 1000);
      const pct    = Math.min(100, (remSec / totalSec) * 100);
      const ceil   = Math.ceil(remSec);
      const dec    = remSec.toFixed(1);

      const bigEl = document.getElementById('timer-big');
      const barEl = document.getElementById('timer-bar');

      bigEl.textContent = dec;
      barEl.style.width = pct + '%';

      if (isPreview) {
        bigEl.className = 'timer-big t-preview';
        barEl.className = 'timer-bar tbar-preview';
      } else if (ceil <= 5) {
        bigEl.className = 'timer-big t-urgent';
        barEl.className = 'timer-bar tbar-urgent';
      } else {
        bigEl.className = 'timer-big t-normal';
        barEl.className = 'timer-bar tbar-bid';
      }

      if (remMs <= 0 && isPreview && !transLock) {
        transLock = true; stopTimer(); transitionToBidding();
      }
      // ✅ 경매 시간 종료 → 자동 낙찰 or 자동 유찰
      if (remMs <= 0 && !isPreview && !transLock) {
        transLock = true; stopTimer(); autoSettle();
      }
    }, 50);
  }
  function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

  // ── 자동 낙찰 / 자동 유찰
  async function autoSettle() {
    if (roomData?.auction?.status !== 'bidding') { transLock = false; return; }
    const { auction, teams } = roomData;

    if (auction.currentLeader) {
      const tk  = auction.currentLeader;
      const pid = auction.currentPlayer;
      const bid = auction.currentBid;
      const upd = {};
      upd[`rooms/${ROOM}/teams/${tk}/members`]        = [...(teams[tk].members||[]), pid];
      upd[`rooms/${ROOM}/teams/${tk}/points`]         = teams[tk].points - bid;
      upd[`rooms/${ROOM}/players/${pid}/assignedTo`]  = tk;
      const log = [...(auction.log||[]), { pid, teamKey: tk, price: bid, ts: Date.now() }];
      upd[`rooms/${ROOM}/auction/log`] = log;
      await nextPlayer(upd);
      showToast(`🔨 자동 낙찰! ${getTeamName(tk)} (-${bid}pt)`);
    } else {
      // 입찰자 없음 → 자동 유찰
      await nextPlayer({});
      showToast('⏰ 시간 초과 — 자동 유찰');
    }
    transLock = false;
  }

  async function transitionToBidding() {
    if (roomData?.auction?.status !== 'preview') { transLock = false; return; }
    const { ref, update } = window._dbFns;
    await update(ref(window._db, `rooms/${ROOM}/auction`), {
      status: 'bidding', timerEndsAt: Date.now() + BID_SEC * 1000
    });
    transLock = false;
  }

  // ── 경매 시작
  // ── 경매 시작 전 전체화면 카운트다운
  let _startCountInterval = null;
  let _shuffledOrder = null; // 추첨 결과 순서 저장

  function startAuctionWithCountdown() {
    // 미접속 팀장 확인
    const teams = Object.entries(roomData?.teams || {});
    const offline = teams.filter(([,t]) => !t.leaderOnline).map(([,t]) => t.name);
    if (offline.length > 0) {
      const go = confirm(`아직 접속하지 않은 팀장이 있습니다:\n\n${offline.map(n=>'• '+n).join('\n')}\n\n그래도 경매를 시작하시겠습니까?`);
      if (!go) return;
    }
    const overlay = document.getElementById('start-countdown-overlay');
    overlay.style.display = 'flex';
    let sec = 10;
    const numEl = document.getElementById('start-count-num');
    function tick() {
      numEl.textContent = sec;
      numEl.style.transform = 'scale(1.15)';
      numEl.style.color = sec <= 3 ? 'var(--danger)' : 'var(--accent)';
      setTimeout(() => { numEl.style.transform = 'scale(1)'; }, 150);
      if (sec <= 0) {
        clearInterval(_startCountInterval);
        overlay.style.display = 'none';
        startAuction();
        return;
      }
      sec--;
    }
    tick();
    _startCountInterval = setInterval(tick, 1000);
  }

  function skipStartCountdown() {
    clearInterval(_startCountInterval);
    document.getElementById('start-countdown-overlay').style.display = 'none';
    startAuction();
  }

  // ── 추첨 다시하기
  function retryLottery() {
    _shuffledOrder = null;
    const msg = document.getElementById('lottery-status-msg');
    msg.textContent = '시작 버튼을 누르면 팀장 순서를 추첨합니다';
    msg.style.color = 'var(--muted)';
    document.getElementById('start-btn').style.display = '';
    document.getElementById('start-btn').disabled = false;
    document.getElementById('retry-btn').style.display = 'none';
    document.getElementById('begin-auction-btn').style.display = 'none';
    // 슬롯 초기화
    if (roomData) {
      Object.keys(roomData.teams || {}).forEach(tk => {
        const el   = document.getElementById('ls-order-' + tk);
        const card = document.getElementById('ls-' + tk);
        if (el)   { el.textContent = '?'; el.style.color = 'var(--muted)'; el.style.fontWeight = '400'; }
        if (card) { card.style.transform = ''; card.style.filter = ''; }
      });
    }
  }

  async function startAuction() {
    const { ref, update, get } = window._dbFns;

    // 추첨 순서가 있으면 → 팀장별 입찰 포인트 순서 조정
    // (추첨 순서는 팀장 입찰 순서이지 선수 경매 순서와 다름 — 여기선 meta에 저장)
    const upd = {};
    if (_shuffledOrder && _shuffledOrder.length > 0) {
      upd[`rooms/${ROOM}/meta/leaderOrder`] = _shuffledOrder;
    }

    const first = roomData.auction.order[0];
    upd[`rooms/${ROOM}/auction/status`]        = 'preview';
    upd[`rooms/${ROOM}/auction/currentPlayer`] = first;
    upd[`rooms/${ROOM}/auction/currentBid`]    = 0;
    upd[`rooms/${ROOM}/auction/currentLeader`] = null;
    upd[`rooms/${ROOM}/auction/timerEndsAt`]   = Date.now() + PREVIEW_SEC * 1000;
    await update(ref(window._db), upd);
  }

  // ── 낙찰
  async function hammered() {
    const { ref, update } = window._dbFns;
    const { auction, teams } = roomData;
    if (!auction.currentLeader) { showToast('입찰자가 없습니다'); return; }
    const tk  = auction.currentLeader, pid = auction.currentPlayer, bid = auction.currentBid;
    const upd = {};
    upd[`rooms/${ROOM}/teams/${tk}/members`]       = [...(teams[tk].members||[]), pid];
    upd[`rooms/${ROOM}/teams/${tk}/points`]        = teams[tk].points - bid;
    upd[`rooms/${ROOM}/players/${pid}/assignedTo`] = tk;
    const log = [...(auction.log||[]), { pid, teamKey: tk, price: bid, ts: Date.now() }];
    upd[`rooms/${ROOM}/auction/log`] = log;
    await nextPlayer(upd);
    showToast(`🔨 ${getTeamName(tk)} 낙찰! (-${bid}pt)`);
  }

  // ── 유찰
  async function confirmNobid() {
    if (!confirm('유찰 처리하시겠습니까?')) return;
    await nextPlayer({}); showToast('유찰 처리됨');
  }

  // ── 일시정지 / 재개
  async function togglePause() {
    const { ref, update } = window._dbFns;
    const { auction } = roomData;
    const isPaused = auction.paused || false;
    const btn = document.getElementById('pause-btn');
    if (!isPaused) {
      // 일시정지: 남은 시간 저장, 타이머 멈춤
      const remaining = Math.max(0, auction.timerEndsAt - Date.now());
      await update(ref(window._db, `rooms/${ROOM}/auction`), {
        paused: true,
        pausedRemaining: remaining
      });
      showToast('⏸ 경매 일시정지');
    } else {
      // 재개: 남은 시간 기준으로 timerEndsAt 재계산
      const remaining = auction.pausedRemaining || 5000;
      await update(ref(window._db, `rooms/${ROOM}/auction`), {
        paused: false,
        pausedRemaining: null,
        timerEndsAt: Date.now() + remaining
      });
      showToast('▶ 경매 재개');
    }
  }

  // ── 건너뛰기
  async function skipPlayer() {
    const { ref, update } = window._dbFns;
    const { auction } = roomData;
    const order = [...auction.order];
    const idx = order.indexOf(auction.currentPlayer);
    if (idx !== -1) { order.splice(idx,1); order.push(auction.currentPlayer); }
    const nextPid = order.find(pid => roomData.players[pid]?.assignedTo == null) || order[0];
    await update(ref(window._db, `rooms/${ROOM}/auction`), {
      order, status:'preview', currentPlayer:nextPid,
      currentBid:0, currentLeader:null, timerEndsAt: Date.now() + PREVIEW_SEC * 1000
    });
    showToast('건너뛰었습니다');
  }

  // ── 다음 선수
  async function nextPlayer(extra={}) {
    const { ref, update, get } = window._dbFns;

    // extra 먼저 커밋 (낙찰 처리: assignedTo, members 포함)
    if (Object.keys(extra).length > 0) {
      await update(ref(window._db), extra);
    }

    // Firebase에서 최신 상태 다시 읽어서 rem 계산 (낙찰 반영 보장)
    const freshSnap = await get(ref(window._db, `rooms/${ROOM}`));
    const fresh = freshSnap.val();
    const { auction, players } = fresh;

    const curPid = auction.currentPlayer;
    const rem = auction.order.filter(pid =>
      pid !== curPid && players[pid]?.assignedTo == null
    );

    if (rem.length === 0) {
      await update(ref(window._db), {
        [`rooms/${ROOM}/auction/status`]: 'finished',
        [`rooms/${ROOM}/auction/currentPlayer`]: null,
      });
      return;
    }

    const nextPid  = rem[0];
    const nextP    = players[nextPid];
    const nextKey  = `${nextP?.grade||'고'}_${nextP?.role||''}`;

    const curP   = curPid ? players[curPid] : null;
    const curKey = curP ? `${curP.grade||'고'}_${curP.role||''}` : null;

    // 그룹이 바뀌면 브레이크 화면
    if (curKey && curKey !== nextKey) {
      const curLabel  = `${curP.grade==='고'?'고티어':'저티어'} ${curP.role}`;
      const nextLabel = `${nextP?.grade==='고'?'고티어':'저티어'} ${nextP?.role||''}`;
      showBreak(curLabel, nextLabel, async () => {
        await update(ref(window._db), {
          [`rooms/${ROOM}/auction/status`]:        'preview',
          [`rooms/${ROOM}/auction/currentPlayer`]: nextPid,
          [`rooms/${ROOM}/auction/currentBid`]:    0,
          [`rooms/${ROOM}/auction/currentLeader`]: null,
          [`rooms/${ROOM}/auction/timerEndsAt`]:   Date.now() + PREVIEW_SEC * 1000,
        });
      });
      return;
    }

    // 같은 그룹이면 바로 다음 선수로
    await update(ref(window._db), {
      [`rooms/${ROOM}/auction/status`]:        'preview',
      [`rooms/${ROOM}/auction/currentPlayer`]: nextPid,
      [`rooms/${ROOM}/auction/currentBid`]:    0,
      [`rooms/${ROOM}/auction/currentLeader`]: null,
      [`rooms/${ROOM}/auction/timerEndsAt`]:   Date.now() + PREVIEW_SEC * 1000,
    });
  }

  // ── 포지션 전환 브레이크 화면
  function showBreak(doneLabel, nextLabel, onDone) {
    stopTimer();
    document.getElementById('break-overlay').style.display = '';
    document.getElementById('break-done-txt').textContent  = `${doneLabel} 경매 완료!`;
    document.getElementById('break-next-txt').textContent  = nextLabel;
    breakRemaining = BREAK_SEC;
    breakPaused    = false;
    const pauseBtn = document.getElementById('break-pause-btn');
    pauseBtn.textContent = '⏸ 일시정지';
    pauseBtn.style.background = 'rgba(245,158,11,.15)';
    pauseBtn.style.color      = 'var(--accent)';
    pauseBtn.style.borderColor= 'var(--accent)';

    const countEl = document.getElementById('break-count');

    function tick() {
      countEl.textContent = Math.ceil(breakRemaining);
      countEl.className   = 'break-count' + (breakRemaining <= 3 ? ' urgent' : '');
      if (breakRemaining <= 0) {
        clearInterval(breakInterval);
        document.getElementById('break-overlay').style.display = 'none';
        onDone();
        return;
      }
    }
    tick();
    clearInterval(breakInterval);
    breakInterval = setInterval(() => {
      if (!breakPaused) {
        breakRemaining -= 0.1;
        tick();
      }
    }, 100);

    // skipBreak / toggleBreakPause 에서 onDone 접근용
    window._breakOnDone = onDone;
  }

  function toggleBreakPause() {
    breakPaused = !breakPaused;
    const btn = document.getElementById('break-pause-btn');
    if (breakPaused) {
      btn.textContent = '▶ 재개';
      btn.style.background  = 'rgba(34,197,94,.15)';
      btn.style.color       = 'var(--success)';
      btn.style.borderColor = 'var(--success)';
    } else {
      btn.textContent = '⏸ 일시정지';
      btn.style.background  = 'rgba(245,158,11,.15)';
      btn.style.color       = 'var(--accent)';
      btn.style.borderColor = 'var(--accent)';
    }
  }

  function skipBreak() {
    clearInterval(breakInterval);
    breakRemaining = 0;
    document.getElementById('break-overlay').style.display = 'none';
    if (window._breakOnDone) window._breakOnDone();
  }

  // ── 랜덤 추첨 (두구두구 → 짜잔 연출)
  function startWithLottery() {
    if (!roomData) return;
    const btn = document.getElementById('start-btn');
    btn.disabled = true;

    const msg = document.getElementById('lottery-status-msg');
    const teamKeys = Object.keys(roomData.teams || {});
    const shuffled = [...teamKeys].sort(() => Math.random() - 0.5);

    // 슬롯 초기화
    teamKeys.forEach(tk => {
      const el   = document.getElementById(`ls-order-${tk}`);
      const card = document.getElementById(`ls-${tk}`);
      if (el)   { el.textContent = '?'; el.style.color = 'var(--muted)'; el.style.fontWeight = '400'; }
      if (card) { card.style.transform = ''; card.style.opacity = '1'; }
    });

    // 1단계: 두구두구 — 모든 슬롯이 랜덤하게 빠르게 바뀜
    msg.style.color = 'var(--preview)';
    msg.textContent = '🎲 추첨 중...';

    let drumRoll = 0;
    const drumInterval = setInterval(() => {
      // 각 슬롯에 랜덤 숫자를 빠르게 표시
      const randomOrder = [...teamKeys].sort(() => Math.random() - 0.5);
      randomOrder.forEach((tk, i) => {
        const el = document.getElementById(`ls-order-${tk}`);
        if (el) {
          el.textContent = `${i+1}순위`;
          el.style.color = 'var(--muted)';
          el.style.fontWeight = '400';
        }
      });
      drumRoll++;
    }, 80); // 80ms 간격으로 빠르게

    // 2단계: 서서히 느려지다가 한 명씩 확정 공개
    setTimeout(() => {
      clearInterval(drumInterval);
      // 슬롯 다시 초기화
      teamKeys.forEach(tk => {
        const el = document.getElementById(`ls-order-${tk}`);
        if (el) { el.textContent = '?'; el.style.color = 'var(--muted)'; }
      });

      msg.style.color = 'var(--accent)';
      msg.textContent = '🥁 결과 공개 중...';

      // 3단계: 한 명씩 순서대로 공개 (짜잔!)
      shuffled.forEach((tk, i) => {
        setTimeout(() => {
          const el   = document.getElementById(`ls-order-${tk}`);
          const card = document.getElementById(`ls-${tk}`);
          const name = roomData.teams[tk]?.name || tk;

          // 잠깐 물음표 깜빡임
          let blink = 0;
          const blinkInt = setInterval(() => {
            if (el) el.textContent = blink % 2 === 0 ? '...' : '?';
            blink++;
            if (blink >= 6) {
              clearInterval(blinkInt);
              // 확정 공개!
              if (el) {
                el.textContent    = `${i+1}순위`;
                el.style.color    = i === 0 ? '#f59e0b' : i === 1 ? '#94a3b8' : 'var(--text)';
                el.style.fontWeight = i === 0 ? '900' : '700';
                el.style.fontSize = i === 0 ? '1rem' : '.9rem';
              }
              if (card) {
                card.style.transition  = 'transform .3s, box-shadow .3s';
                card.style.transform   = 'scale(1.18)';
                card.style.filter      = i === 0 ? 'drop-shadow(0 0 12px #f59e0b)' : '';
                setTimeout(() => {
                  card.style.transform = 'scale(1)';
                  card.style.filter    = '';
                }, 350);
              }
              // 1순위 공개 시 특별 메시지
              if (i === 0) {
                msg.textContent = `🎉 1순위: ${name} 팀장!`;
                msg.style.color = '#f59e0b';
              }
              // 마지막 공개
              if (i === shuffled.length - 1) {
                // 추첨 순서 저장
                _shuffledOrder = shuffled;
                setTimeout(() => {
                  msg.textContent = `✅ 추첨 완료! 1순위: ${roomData.teams[shuffled[0]]?.name}`;
                  msg.style.color = 'var(--success)';
                  // 경매 시작 + 다시하기 버튼 표시
                  document.getElementById('begin-auction-btn').style.display = '';
                  document.getElementById('retry-btn').style.display = '';
                  btn.style.display = 'none';
                }, 400);
              }
            }
          }, 120);
        }, i * 700); // 700ms 간격으로 한 명씩
      });
    }, 1500); // 1.5초간 두구두구
  }

  function runLottery() { startWithLottery(); }
  // ── 채팅 (진행자) ────────────────────────────────────────────────
  let chatOpen = false;
  let unreadCount = 0;
  let lastChatTs = 0;

  function initHostChat() {
    const { ref, onValue } = window._dbFns;
    onValue(ref(window._db, `rooms/${ROOM}/chat`), snap => {
      renderHostChatMessages(snap.val() || {});
    });
  }

  function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-box').classList.toggle('open', chatOpen);
    if (chatOpen) {
      unreadCount = 0;
      updateChatBadge();
      scrollChatBottom();
      document.getElementById('chat-input').focus();
    }
  }

  function updateChatBadge() {
    const badge = document.getElementById('chat-badge');
    if (unreadCount > 0 && !chatOpen) {
      badge.style.display = 'flex';
      badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
    } else {
      badge.style.display = 'none';
    }
  }

  function renderHostChatMessages(msgs) {
    const el = document.getElementById('chat-messages');
    if (!el) return;
    const entries = Object.values(msgs).sort((a,b) => a.ts - b.ts);
    const newMsgs = entries.filter(m => m.ts > lastChatTs);
    if (newMsgs.length > 0 && !chatOpen) {
      unreadCount += newMsgs.length;
      updateChatBadge();
    }
    if (entries.length > 0) lastChatTs = entries[entries.length-1].ts;

    el.innerHTML = entries.map(m => {
      const isMe     = m.senderId === 'host';
      const isSystem = m.type === 'system';
      const dt       = new Date(m.ts);
      const timeStr  = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      if (isSystem) {
        return `<div class="chat-msg system"><div class="chat-bubble" style="font-size:.72rem;">${m.text}</div></div>`;
      }
      const name = isMe ? '🎙 진행자' : m.senderName;
      return `<div class="chat-msg ${isMe?'mine':'others'}">
        ${!isMe ? `<div class="chat-name">${name}</div>` : ''}
        <div style="display:flex;align-items:flex-end;gap:4px;${isMe?'flex-direction:row-reverse;':''}">
          <div class="chat-bubble">${m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <div class="chat-time">${timeStr}</div>
        </div>
      </div>`;
    }).join('');
    if (chatOpen) scrollChatBottom();
  }

  function scrollChatBottom() {
    const el = document.getElementById('chat-messages');
    if (el) setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
  }

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;
    const { ref, push } = window._dbFns;
    await push(ref(window._db, `rooms/${ROOM}/chat`), {
      senderId: 'host', senderName: '🎙 진행자',
      text, ts: Date.now(), type: 'message'
    });
    input.value = '';
  }

  function copyObs() { navigator.clipboard.writeText(`${BASE}auction.html?room=${ROOM}&role=observer`).then(()=>showToast('복사됨!')); }
  function copyObsEl() { navigator.clipboard.writeText(document.getElementById('obs-link').textContent).then(()=>showToast('복사됨!')); }
  function goAdmin() { window.open(`admin.html?room=${ROOM}`, '_blank'); }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }
</script>
</body>
</html>

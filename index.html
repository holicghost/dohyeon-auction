<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RØDE 도현 배 유인원 컵</title>
  <meta name="description" content="By ONSIDE COMPANY" />
  <!-- Open Graph (카카오톡, 디스코드 등 링크 미리보기) -->
  <meta property="og:title" content="RØDE 도현 배 유인원 컵" />
  <meta property="og:description" content="By ONSIDE COMPANY" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dohyeon-auction.vercel.app" />
  <!-- 카카오톡 -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="RØDE 도현 배 유인원 컵" />
  <meta name="twitter:description" content="By ONSIDE COMPANY" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  
  <style>
    :root {
      --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e3a5f;
      --accent:#f59e0b; --accent2:#3b82f6; --text:#e2e8f0; --muted:#64748b;
      --danger:#ef4444; --success:#22c55e;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;font-size:1.05rem;letter-spacing:-0.03em;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:32px 16px;
      background-image:radial-gradient(ellipse at 20% 50%,rgba(59,130,246,.08) 0%,transparent 60%),
                       radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.08) 0%,transparent 60%);}
    .logo{font-family:'Pretendard',sans-serif;font-weight:900;font-size:2.4rem;letter-spacing:-1px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
    .sub{color:var(--muted);font-size:.9rem;margin-bottom:40px;text-align:center;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
      padding:28px;width:100%;max-width:580px;margin-bottom:16px;}
    .card h2{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:20px;
      letter-spacing:-0.01em;text-transform:uppercase;}
    .fg{margin-bottom:12px;}
    label{display:block;font-size:.88rem;color:var(--muted);margin-bottom:5px;}
    input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;color:var(--text);padding:9px 12px;font-size:.9rem;
      font-family:inherit;outline:none;transition:border-color .2s;}
    textarea{resize:vertical;min-height:48px;}
    input:focus,select:focus,textarea:focus{border-color:var(--accent2);}
    .r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:1rem;
      font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;margin-top:8px;}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#d97706);color:#0a0e1a;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,158,11,.4);}
    .btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .btn-sec:hover{border-color:var(--accent2);}
    .divider{text-align:center;color:var(--muted);font-size:.8rem;margin:8px 0 24px;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
    .divider::before{left:0;}.divider::after{right:0;}
    .sec-title{font-size:.82rem;color:var(--muted);margin:20px 0 10px;font-weight:500;letter-spacing:-0.02em;}
    .leader-item{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
    .leader-num{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--muted);flex-shrink:0;}

    /* 선수 폼 카드 */
    .pfc{background:var(--surface2);border:1px solid var(--border);border-radius:12px;
      padding:16px;margin-bottom:12px;position:relative;}
    .pfc-num{font-size:.72rem;color:var(--accent);font-weight:700;margin-bottom:10px;letter-spacing:1px;}
    .remove-btn{position:absolute;top:12px;right:12px;background:none;border:none;
      color:var(--muted);cursor:pointer;font-size:1rem;transition:color .2s;}
    .remove-btn:hover{color:var(--danger);}

    /* 등급 버튼 */
    .grade-group{display:flex;gap:6px;flex-wrap:wrap;}
    .grade-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);
      background:var(--surface);color:var(--muted);font-size:.75rem;font-family:inherit;
      cursor:pointer;transition:all .15s;}
    .grade-btn.sel-고{background:#ef4444;color:#fff;border-color:#ef4444;}
    .grade-btn.sel-저{background:#3b82f6;color:#fff;border-color:#3b82f6;}

    /* 사진 업로드 */
    .photo-upload-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .photo-preview{width:52px;height:52px;border-radius:8px;object-fit:cover;
      background:var(--surface2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;font-size:1.4rem;
      flex-shrink:0;overflow:hidden;}
    .photo-preview img{width:100%;height:100%;object-fit:cover;}
    .photo-upload-label{flex:1;background:var(--surface2);border:1px dashed var(--border);
      border-radius:8px;padding:8px 12px;font-size:.78rem;color:var(--muted);cursor:pointer;
      text-align:center;transition:all .2s;}
    .photo-upload-label:hover{border-color:var(--accent2);color:var(--accent2);}
    .photo-upload-label input{display:none;}

    .add-btn{background:none;border:1px dashed var(--border);color:var(--muted);
      border-radius:8px;width:100%;padding:10px;font-size:.85rem;cursor:pointer;
      font-family:inherit;margin-top:4px;transition:all .2s;}
    .add-btn:hover{border-color:var(--accent2);color:var(--accent2);}
    .room-item{display:flex;align-items:center;justify-content:space-between;
      background:var(--surface2);border:1px solid var(--border);border-radius:8px;
      padding:10px 14px;margin-bottom:8px;}
    .room-item-code{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:var(--accent);letter-spacing:3px;}
    .room-item-info{font-size:.75rem;color:var(--muted);margin-top:2px;}
    .room-item-btn{background:linear-gradient(135deg,var(--accent),#d97706);border:none;
      border-radius:7px;color:#0a0e1a;font-weight:700;font-family:inherit;font-size:.78rem;
      padding:6px 14px;cursor:pointer;white-space:nowrap;}
    .room-item-btn:hover{opacity:.85;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:var(--surface2);border:1px solid var(--border);color:var(--text);
      padding:12px 24px;border-radius:10px;font-size:.9rem;opacity:0;pointer-events:none;
      transition:opacity .3s;z-index:999;}
    .toast.show{opacity:1;}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    const firebaseConfig = {
      apiKey: "AIzaSyA0czyhDNksFIN8097sE0dJcErcYBZGC5s",
      authDomain: "dohyeon-4e4e0.firebaseapp.com",
      databaseURL: "https://dohyeon-4e4e0-default-rtdb.asia-southeast1.firebasedatabase.app",

      storageBucket: "dohyeon-4e4e0.firebasestorage.app",
      messagingSenderId: "231075336771",
      appId: "1:231075336771:web:6a111f7c1aa9a2ae4a3af6"
    };
    firebase.initializeApp(firebaseConfig);
    window._db = firebase.database();
    window._dbFns = {

      update: (refOrDb, val) => {
        if (typeof val === 'undefined') return refOrDb;
        const r = (refOrDb && typeof refOrDb.ref === 'function') ? refOrDb.ref() : refOrDb;
        return r.update(val);
      }
    };
    window._remove = (ref) => ref.remove();

  </script>
</head>
<body>

<div style="text-align:center;margin-bottom:4px;">
  <div style="font-size:1.1rem;font-family:'Pretendard',sans-serif;font-weight:600;color:var(--muted);letter-spacing:0px;margin-bottom:4px;">RØDE와 함께하는</div>
  <div class="logo">도현 배 유인원 컵</div>
</div>
<p class="sub">오버워치 모의 경매 시스템</p>

<!-- 로그인 사용자 표시 -->
<div id="user-bar" style="display:none;width:100%;max-width:580px;
  align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;margin-bottom:12px;font-size:.82rem;">
  <span>👤 <span id="user-name-disp" style="color:var(--accent);font-weight:700;"></span> 님</span>
  <button onclick="doLogout()" style="background:none;border:1px solid var(--border);border-radius:6px;
    color:var(--muted);padding:4px 10px;font-size:.75rem;cursor:pointer;font-family:inherit;">로그아웃</button>
</div>

<!-- 메인 선택 화면 -->
<div id="main-select" class="card" style="max-width:580px;width:100%;">
  <div style="display:flex;flex-direction:column;gap:12px;">
    <button class="btn btn-primary" onclick="showSection('create')" style="font-size:1rem;padding:16px;">
      🏆 새로운 방 생성하기
    </button>
    <button class="btn btn-sec" id="myrooms-main-btn" onclick="showSection('myrooms')" style="font-size:1rem;padding:16px;border-color:var(--accent2);color:var(--accent2);display:none;">
      📋 내가 만든 방 수정하기
    </button>
    <button class="btn btn-sec" onclick="showSection('join')" style="font-size:1rem;padding:16px;">
      🔗 기존 방 입장하기
    </button>
    <button class="btn btn-sec" onclick="showSection('users')" id="users-main-btn"
      style="font-size:1rem;padding:16px;border-color:#22c55e;color:#22c55e;display:none;">
      👥 이용자 관리
    </button>
    <button class="btn btn-sec" onclick="showSection('admin')" id="admin-main-btn"
      style="font-size:1rem;padding:16px;border-color:var(--accent);color:var(--accent);">
      ⚙ 관리 페이지 입장하기
    </button>
  </div>
</div>

<!-- 방 만들기 -->
<div id="section-create" style="display:none;width:100%;max-width:580px;">
  <button onclick="showSection(null)" class="btn btn-ghost" style="margin-bottom:10px;font-size:.82rem;">← 돌아가기</button>
  <div class="card">
    <h2>🏆 새 경매 방 만들기</h2>
    <div class="fg">
      <label>경매 타이틀</label>
      <input type="text" id="title" value="도현 유인원 컵" />
    </div>
    <div class="r3">
      <div class="fg">
        <label>팀 수</label>
        <select id="teamCount" onchange="onConfigChange()">
          <option value="2">2팀</option><option value="3">3팀</option>
          <option value="4">4팀</option><option value="5" selected>5팀</option><option value="6">6팀</option>
        </select>
      </div>
      <div class="fg">
        <label>팀당 인원 (팀장 포함)</label>
        <input type="number" id="membersPerTeam" value="6" min="2" max="12" onchange="onConfigChange()" />
      </div>
      <div class="fg"><label>팀당 포인트</label><input type="number" id="points" value="1000" min="10" /></div>
    </div>
    <div id="player-count-hint" style="font-size:.8rem;color:var(--accent);background:rgba(245,158,11,.08);
      border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 12px;margin-bottom:12px;">
      5팀 × 6명 = 총 30명 | 팀장 5명 + 경매 대상 <strong>25명</strong>
    </div>
    <div class="r2">
      <div class="fg"><label>입찰 시간 (초)</label><input type="number" id="timerSec" value="10" min="5" max="60" /></div>
      <div class="fg"><label>최소 입찰 단위</label><input type="number" id="minBid" value="10" min="1" /></div>
    </div>
    <p class="sec-title">팀장 이름 & 사진</p>
    <div id="leaders-list"></div>
    <p class="sec-title">
      경매 선수 목록
      <span id="players-count-badge" style="font-size:.75rem;color:var(--muted);font-weight:400;margin-left:8px;"></span>
    </p>
    <div id="players-list"></div>
    <button class="add-btn" onclick="addPlayer()">+ 선수 수동 추가</button>
    <div id="save-btns" style="display:flex;gap:8px;margin-bottom:12px;margin-top:4px;">
      <button class="btn btn-ghost" onclick="saveFormData()" style="flex:1;font-size:.85rem;">💾 임시저장</button>
      <button class="btn btn-ghost" onclick="openDraftModal()" style="flex:1;font-size:.85rem;">📂 저장 목록</button>
    </div>
    <div id="save-info" style="font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:8px;display:none;"></div>

    <!-- 임시저장 목록 모달 -->
    <div id="draft-modal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);overflow-y:auto;">
      <div style="max-width:520px;margin:48px auto 48px;background:var(--card);border-radius:16px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.4);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <span style="font-size:1.05rem;font-weight:700;">📂 임시저장 목록</span>
          <button onclick="closeDraftModal()" style="background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;">✕</button>
        </div>
        <div id="draft-list-area" style="display:flex;flex-direction:column;gap:10px;min-height:80px;">
          <div style="text-align:center;color:var(--muted);font-size:.85rem;padding:24px 0;">불러오는 중...</div>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" id="create-btn" onclick="createRoom()">방 만들기 →</button>
  </div>
</div>

<!-- 이용자 관리 -->
<div id="section-users" style="display:none;width:100%;max-width:580px;">
  <button onclick="showSection(null)" class="btn btn-ghost" style="margin-bottom:10px;font-size:.82rem;">← 돌아가기</button>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h2 style="font-size:1.1rem;margin:0;">👥 이용자 관리</h2>
      <div style="display:flex;align-items:center;gap:8px;">
        <input id="user-search" type="text" placeholder="이름 / 아이디 검색"
          oninput="filterUsers()"
          style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;
            color:var(--text);padding:7px 12px;font-size:.82rem;font-family:inherit;outline:none;width:160px;" />
        <button onclick="loadUsersList()" style="background:none;border:1px solid var(--border);
          border-radius:6px;color:var(--muted);padding:6px 12px;font-size:.76rem;cursor:pointer;font-family:inherit;">
          🔄
        </button>
      </div>
    </div>
    <!-- 요약 통계 -->
    <div id="users-stats" style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;"></div>
    <!-- 이용자 목록 -->
    <div id="users-list-main" style="display:flex;flex-direction:column;gap:8px;">
      <div style="color:var(--muted);font-size:.82rem;text-align:center;padding:20px;">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 내 방 수정 -->
<div id="section-myrooms" style="display:none;width:100%;max-width:580px;">
  <button onclick="showSection(null)" class="btn btn-ghost" style="margin-bottom:10px;font-size:.82rem;">← 돌아가기</button>
  <div class="card">
    <h2 style="margin-bottom:16px;">📋 내가 만든 방 수정하기</h2>
    <div class="fg" style="margin-bottom:6px;">
      <label>방 선택</label>
      <select id="myroom-select" style="width:100%;background:var(--surface2);border:1px solid var(--border);
        border-radius:8px;color:var(--text);padding:11px 14px;font-size:.95rem;font-family:inherit;outline:none;">
        <option value="">-- 방을 선택하세요 --</option>
      </select>
    </div>
    <div id="myroom-info" style="display:none;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;padding:12px 14px;font-size:.8rem;color:var(--muted);margin-bottom:10px;">
    </div>
    <button class="btn btn-primary" onclick="loadMyRoom()" style="margin-bottom:0;">
      ✏️ 선택한 방 수정하기
    </button>
  </div>
</div>

<!-- 기존 방 참여 -->
<div id="section-join" style="display:none;width:100%;max-width:580px;">
  <button onclick="showSection(null)" class="btn btn-ghost" style="margin-bottom:10px;font-size:.82rem;">← 돌아가기</button>
  <div class="card">
    <h2>🔗 기존 방 참여</h2>
    <div class="fg">
      <label>방 코드 입력</label>
      <input type="text" id="join-code" placeholder="예: ABC123"
        style="text-transform:uppercase;letter-spacing:3px;font-size:1.2rem;text-align:center;" />
    </div>
    <button class="btn btn-sec" onclick="joinRoom()">입장하기 →</button>
  </div>
</div>

<!-- 관리 페이지 -->
<div id="section-admin" style="display:none;width:100%;max-width:580px;">
  <button onclick="showSection(null)" class="btn btn-ghost" style="margin-bottom:10px;font-size:.82rem;">← 돌아가기</button>
  <div class="card">
    <h2>⚙ 관리자 패널</h2>
    <div id="admin-pw-section">
      <div class="fg">
        <input type="password" id="admin-pw-input" placeholder="관리자 비밀번호"
          style="font-size:1.1rem;text-align:center;letter-spacing:3px;"
          onkeydown="if(event.key==='Enter')checkAdminPw()" />
      </div>
      <button class="btn btn-sec" onclick="checkAdminPw()" style="border-color:var(--accent);color:var(--accent);">⚙ 확인 →</button>
    </div>
    <div id="admin-room-section" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span style="font-size:.8rem;color:var(--muted);">열려있는 방 목록</span>
        <button onclick="loadRooms()" style="background:none;border:none;color:var(--accent2);font-size:.78rem;cursor:pointer;font-family:inherit;">🔄 새로고침</button>
      </div>
      <div id="admin-room-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer style="margin-top:12px;padding-bottom:12px;text-align:center;">
  <a href="https://www.onsidecompany.co.kr/" target="_blank" rel="noopener"

      parts.push(`<optgroup label="${roleLabel[role]}">`);
      for (const name of sorted) {
        parts.push(`<option value="${name}"${disabled ? ' disabled' : ''}>${name}</option>`);
      }
      parts.push('</optgroup>');
    }
    return parts.join('');
  }
  function heroImgUrl(name) {
    const k = OW_HEROES[name];
    if (!k) return '';
    // CDN 슬러그 재정의 (점·특수문자 제거 등)
    const SLUG_FIX = {
      'd.va':         'dva',
      'wrecking-ball':'wrecking-ball',

    const slug = SLUG_FIX[k] || k;

    // OW1 영웅이지만 점이 있는 슬러그(d.va)는 URL에 그대로 써도 됨
    return `https://blzgdapipro-a.akamaihd.net/hero/${k}/icon-portrait.png`;
  }
  // 이미지 로드 실패 시 대체 CDN 시도
  function heroImgHtml(name, cls='') {

    // 미스포춘, 주노 등 누락 가능 영웅은 두 CDN 모두 시도
    const k = OW_HEROES[name] || '';
    const fallback = OW2_NEW.has(k)
      ? \`https://blzgdapipro-a.akamaihd.net/hero/\${k}/icon-portrait.png\`
      : \`https://d15f34w2p8l1cc.cloudfront.net/overwatch/\${(k||'').replace('.','')}.png\`;
    return \`<img src="\${primary}" class="\${cls}"
      style="width:100%;height:100%;object-fit:cover;"

  // ── 선수 칸 자동 생성 (팀수 × 팀원수 - 팀수)
  function autoGeneratePlayers() {
    const teams   = parseInt(document.getElementById('teamCount').value);
    const members = parseInt(document.getElementById('membersPerTeam').value) || 6;
    const needed  = teams * (members - 1); // 팀장 제외한 경매 대상 수

    const list    = document.getElementById('players-list');
    const current = list.querySelectorAll('.pfc').length;

    if (current < needed) {
      // 부족하면 추가
      for (let i = current; i < needed; i++) addPlayer();
    } else if (current > needed) {
      // 넘치면 뒤에서 삭제 (닉네임 비어있는 것만)
      const cards = [...list.querySelectorAll('.pfc')].reverse();
      let toRemove = current - needed;
      for (const card of cards) {
        if (toRemove <= 0) break;
        const name = card.querySelector('.p-name').value.trim();
        if (!name) { card.remove(); toRemove--; }
      }
    }
    updateHint();
  }

  // ── 방 만들기
  // ── 사진 압축 (Firebase 10MB 한도 대비)
  function compressPhoto(dataUrl, maxW=200) {
    if (!dataUrl || !dataUrl.startsWith('data:image')) return dataUrl;
    try {
      const img = new Image();
      img.src = dataUrl;
      const canvas = document.createElement('canvas');
      const scale = Math.min(1, maxW / Math.max(img.width || maxW, 1));
      canvas.width  = (img.width  || maxW) * scale;
      canvas.height = (img.height || maxW) * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.6);
    } catch(e) { return dataUrl; }
  }

  async function createRoom() {
    const { ref, set } = window._dbFns;
    const db = window._db;
    const title          = document.getElementById('title').value.trim() || '도현 유인원 컵';
    const teamCount      = parseInt(document.getElementById('teamCount').value);
    const membersPerTeam = parseInt(document.getElementById('membersPerTeam').value) || 6;
    const points         = parseInt(document.getElementById('points').value);
    const timerSec       = parseInt(document.getElementById('timerSec').value);
    const minBid         = parseInt(document.getElementById('minBid').value);

    const leaders = [...document.querySelectorAll('#leaders-list .l-name')]
      .map((el,i) => el.value.trim() || `팀장${i+1}`);
    const leaderPhotoList = [...document.querySelectorAll('#leaders-list .l-name')]
      .map((el,i) => compressPhoto(leaderPhotos[i] || ''));

    const players = [];
    document.querySelectorAll('.pfc').forEach(card => {
      const name = card.querySelector('.p-name').value.trim();
      if (!name) return;
      players.push({
        name,
        role:     card.querySelector('.p-role').value,
        grade:    card.querySelector('.p-grade').value,
        curTier:  card.querySelector('.p-cur').value,
        prevTier: card.querySelector('.p-prev').value,
        peakTier: card.querySelector('.p-peak').value,
        hero1:    card.querySelector('.p-h1').value.trim(),
        hero2:    card.querySelector('.p-h2').value.trim(),
        hero3:    card.querySelector('.p-h3').value.trim(),
        style:    card.querySelector('.p-style').value,
        intro:    card.querySelector('.p-intro').value.trim(),
        photo:    compressPhoto(card.querySelector('.p-photo')?.value || ''),
        assignedTo: null
      });
    });

    if (players.length === 0) { showToast('선수를 1명 이상 입력해주세요!'); return; }

    const roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();

    const teams = {};
    leaders.forEach((name, i) => {
      teams[`team_${i}`] = {
        name, points, members: [],
        photo: leaderPhotoList[i] || '',
        leaderToken: Math.random().toString(36).substring(2, 10)
      };
    });

    // 경매 순서: 딜러 → 탱커 → 힐러 → 유동, 같은 포지션 내 고티어 → 저티어
    const ROLE_ORDER = { '딜러': 0, '탱커': 1, '힐러': 2, '유동': 3 };
    const GRADE_ORDER = { '고': 0, '저': 1 };
    const sorted = [...players].sort((a, b) => {
      const rA = ROLE_ORDER[a.role] ?? 99;
      const rB = ROLE_ORDER[b.role] ?? 99;
      if (rA !== rB) return rA - rB;
      return (GRADE_ORDER[a.grade] ?? 1) - (GRADE_ORDER[b.grade] ?? 1);
    });
    const playersObj = {};
    sorted.forEach((p, i) => { playersObj[`player_${i}`] = p; });

    const roomData = {
      meta: { title, teamCount, membersPerTeam, points, timerSec, minBid, createdAt: Date.now(),
              createdBy: window._currentUser?.id || 'unknown',
              createdByName: window._currentUser?.name || '알 수 없음' },
      teams,
      players: playersObj,
      auction: {
        status: 'waiting',
        order: Object.keys(playersObj), // already sorted
        currentPlayer: null,
        currentBid: 0,
        currentLeader: null,
        timerEndsAt: null,
        log: null
      }
    };

    if (!window._db || !window._dbFns) {
      showToast('잠시 후 다시 시도해주세요 (초기화 중)');
      return;
    }
    try {
      const btn = document.getElementById('create-btn');
      btn.textContent = '생성 중...'; btn.style.opacity = '.5'; btn.style.pointerEvents = 'none';
      await set(ref(db, `rooms/${roomCode}`), roomData);
      showToast(`방 생성 완료! 코드: ${roomCode}`);
      setTimeout(() => { window.location.href = `host.html?room=${roomCode}`; }, 1200);
    } catch(e) {
      showToast('오류: ' + e.message); console.error(e);
      const btn = document.getElementById('create-btn');
      btn.textContent = '방 만들기 →'; btn.style.opacity = ''; btn.style.pointerEvents = '';
    }
  }

    const { ref, get } = window._dbFns;
    get(ref(window._db, `drafts/${uid}`)).then(snap => {
      const info = document.getElementById('save-info');
      if (!snap.exists() || !info) return;
      const drafts = snap.val();
      const count = Object.keys(drafts).length;
      info.style.display = '';
      info.textContent = `💾 저장된 임시저장 ${count}개`;
    }).catch(()=>{});
  }

  // ── 임시저장 모달 ──────────────────────────────────────────────────
  function openDraftModal() {
    if (window._currentUser?.guest) { showToast('비회원은 임시저장이 불가합니다'); return; }
    document.getElementById('draft-modal').style.display = '';
    renderDraftList();
  }
  function closeDraftModal() {
    document.getElementById('draft-modal').style.display = 'none';
  }

  async function renderDraftList() {
    const area = document.getElementById('draft-list-area');
    area.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.85rem;padding:24px 0;">불러오는 중...</div>';
    if (!window._db || !window._dbFns) {
      area.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.85rem;padding:24px 0;">Firebase 연결 중...</div>';
      return;
    }
    const uid = window._currentUser?.id;
    const { ref, get } = window._dbFns;
    try {
      const snap = await get(ref(window._db, `drafts/${uid}`));
      if (!snap.exists()) {
        area.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.85rem;padding:24px 0;">저장된 내역이 없습니다</div>';
        return;
      }
      const drafts = snap.val();
      // 최신순 정렬
      const sorted = Object.entries(drafts).sort((a, b) => b[1].savedAt - a[1].savedAt);
      area.innerHTML = '';
      sorted.forEach(([draftId, d]) => {
        const dt = new Date(d.savedAt);
        const dateStr = `${dt.toLocaleDateString('ko-KR')} ${dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`;
        const playerCount = d.players?.length || 0;
        const item = document.createElement('div');
        item.style.cssText = 'background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;';
        item.innerHTML = `
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.draftTitle || '제목 없음'}</div>
            <div style="font-size:.75rem;color:var(--muted);margin-top:3px;">${dateStr} · 선수 ${playerCount}명</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <button onclick="loadDraft('${draftId}')" style="background:var(--accent);color:#000;border:none;border-radius:7px;padding:6px 13px;font-size:.8rem;font-weight:700;cursor:pointer;">불러오기</button>
            <button onclick="deleteDraft('${draftId}')" style="background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);border-radius:7px;padding:6px 10px;font-size:.8rem;cursor:pointer;">삭제</button>
          </div>`;
        area.appendChild(item);
      });
    } catch(e) {
      area.innerHTML = `<div style="text-align:center;color:#f87171;font-size:.85rem;padding:24px 0;">오류: ${e.message}</div>`;
    }
  }

  async function loadDraft(draftId) {
    if (!confirm('저장된 내역을 불러오면 현재 입력 내용이 초기화됩니다. 계속할까요?')) return;
    const uid = window._currentUser?.id;
    const { ref, get } = window._dbFns;
    try {
      const snap = await get(ref(window._db, `drafts/${uid}/${draftId}`));
      if (!snap.exists()) { showToast('해당 저장 내역을 찾을 수 없습니다'); return; }
      const { config, leaders, players } = snap.val();
      if (config.title)   document.getElementById('title').value           = config.title;
      if (config.teams)   document.getElementById('teamCount').value        = config.teams;
      if (config.members) document.getElementById('membersPerTeam').value   = config.members;
      if (config.points)  document.getElementById('points').value           = config.points;
      if (config.timer)   document.getElementById('timerSec').value         = config.timer;
      if (config.minBid)  document.getElementById('minBid').value           = config.minBid;

      if (leaders) leaders.forEach((l, i) => { if (l.photo) leaderPhotos[i] = l.photo; });
      renderLeaders();
      setTimeout(() => {
        document.querySelectorAll('.l-name').forEach((el, i) => {
          if (leaders?.[i]?.name) el.value = leaders[i].name;
        });
      }, 50);

      document.getElementById('players-list').innerHTML = '';
      pc = 0;
      if (players?.length > 0) {
        players.forEach(p => {
          addPlayer();
          const cid  = pc;   // addPlayer()가 pc++ 후 반환 — 현재 ID 캡처
          const card = document.getElementById(`pfc-${cid}`);
          if (!card) return;
          if (p.name)     card.querySelector('.p-name').value  = p.name;
          if (p.role)     card.querySelector('.p-role').value  = p.role;
          if (p.curTier)  card.querySelector('.p-cur').value   = p.curTier;
          if (p.prevTier) card.querySelector('.p-prev').value  = p.prevTier;
          if (p.peakTier) card.querySelector('.p-peak').value  = p.peakTier;
          if (p.style)    card.querySelector('.p-style').value = p.style;
          if (p.intro)    card.querySelector('.p-intro').value = p.intro;
          if (p.hero1)  { card.querySelector('.p-h1').value = p.hero1; onHeroSelect(cid, 1, p.hero1); }
          if (p.hero2)  { card.querySelector('.p-h2').value = p.hero2; onHeroSelect(cid, 2, p.hero2); }
          if (p.hero3)  { card.querySelector('.p-h3').value = p.hero3; onHeroSelect(cid, 3, p.hero3); }
          if (p.photo) {
            card.querySelector('.p-photo').value = p.photo;
            const prev = document.getElementById(`pp-prev-${cid}`);
            if (prev) prev.innerHTML = `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;" />`;
          }
          if (p.grade) selGrade(cid, p.grade);
        });
      } else {
        autoGeneratePlayers();
      }
      updateHint();
      closeDraftModal();
      showToast('📂 불러오기 완료!');
    } catch(e) { showToast('불러오기 실패: ' + e.message); }
  }

  async function deleteDraft(draftId) {
    if (!confirm('이 임시저장을 삭제할까요?')) return;
    const uid = window._currentUser?.id;
    try {
      await window._remove(window._dbFns.ref(window._db, `drafts/${uid}/${draftId}`));
      showToast('삭제 완료');
      renderDraftList();
      checkSavedData();
    } catch(e) { showToast('삭제 실패: ' + e.message); }
  }

  // ── (레거시) IndexedDB — 더 이상 사용하지 않으나 호환용 유지

  // ── 섹션 전환
  function showSection(name) {
    document.getElementById('main-select').style.display     = name ? 'none' : '';
    document.getElementById('section-create').style.display  = name === 'create'  ? '' : 'none';
    document.getElementById('section-join').style.display    = name === 'join'    ? '' : 'none';
    document.getElementById('section-admin').style.display   = name === 'admin'   ? '' : 'none';
    document.getElementById('section-myrooms').style.display = name === 'myrooms' ? '' : 'none';
    document.getElementById('section-users').style.display   = name === 'users'   ? '' : 'none';
    if (name === 'create')  { renderLeaders(); autoGeneratePlayers(); checkSavedData(); }
    if (name === 'myrooms') { loadMyRoomList(); }
    if (name === 'users')   { loadUsersList(); }
    if (name === 'admin' && document.getElementById('admin-room-section').style.display !== 'none') loadRooms();
  }

  function initRouteFromPath() {} // Firebase Hosting 없이는 hash 방식 사용

  // ── 내 방 목록 불러오기
  async function loadMyRoomList() {
    const uid = window._currentUser?.id;
    if (!uid) return;
    const sel = document.getElementById('myroom-select');
    sel.innerHTML = '<option value="">불러오는 중...</option>';
    document.getElementById('myroom-info').style.display = 'none';
    try {
      const { ref, get } = window._dbFns;
      const snap = await get(ref(window._db, 'rooms'));
      if (!snap.exists()) {
        sel.innerHTML = '<option value="">만든 방이 없습니다</option>';
        return;
      }
      const rooms = snap.val();
      const mine = Object.entries(rooms)
        .filter(([, r]) => r.meta?.createdBy === uid)
        .sort((a, b) => (b[1].meta?.createdAt || 0) - (a[1].meta?.createdAt || 0));
      if (mine.length === 0) {
        sel.innerHTML = '<option value="">만든 방이 없습니다</option>';
        return;
      }
      sel.innerHTML = '<option value="">-- 방을 선택하세요 --</option>' +
        mine.map(([code, r]) => {
          const title = r.meta?.title || code;
          const dt = r.meta?.createdAt ? new Date(r.meta.createdAt).toLocaleDateString('ko-KR') : '';
          const status = r.auction?.status || 'waiting';
          const statusTxt = status === 'waiting' ? '대기' : status === 'finished' ? '완료' : '진행중';
          return `<option value="${code}">[${code}] ${title} (${statusTxt} · ${dt})</option>`;
        }).join('');
      sel.onchange = () => showMyRoomInfo(sel.value, rooms);
    } catch(e) {
      sel.innerHTML = '<option value="">오류 발생</option>';
    }
  }

  function showMyRoomInfo(code, rooms) {
    const infoEl = document.getElementById('myroom-info');
    if (!code) { infoEl.style.display = 'none'; return; }
    const r = rooms[code];
    if (!r) { infoEl.style.display = 'none'; return; }
    const playerCount = Object.keys(r.players || {}).length;
    const teamCount   = Object.keys(r.teams   || {}).length;
    const settled     = Object.values(r.players || {}).filter(p => p.assignedTo != null).length;
    const status      = r.auction?.status || 'waiting';
    const statusTxt   = status === 'waiting' ? '⏳ 대기 중' : status === 'finished' ? '✅ 완료' : '🔴 진행 중';
    infoEl.innerHTML  = `<strong style="color:var(--text);">${r.meta?.title || code}</strong>
      &nbsp;&nbsp;방코드 <span style="color:var(--accent);font-weight:700;">${code}</span><br>
      팀 ${teamCount}개 · 선수 ${playerCount}명 (낙찰 ${settled}명) · ${statusTxt}`;
    infoEl.style.display = '';
  }

  // 내 방 불러와서 폼에 채우기 (수정 모드)
  let _editRoomCode = null;
  async function loadMyRoom() {
    const code = document.getElementById('myroom-select').value;
    if (!code) { showToast('방을 선택해주세요'); return; }
    if (!confirm(`[${code}] 방을 불러옵니다.\n현재 입력 내용이 초기화됩니다. 계속할까요?`)) return;
    try {
      const { ref, get } = window._dbFns;
      const snap = await get(ref(window._db, `rooms/${code}`));
      if (!snap.exists()) { showToast('방을 찾을 수 없습니다'); return; }
      const room = snap.val();
      const m = room.meta || {};
      // 기본 설정 채우기
      if (m.title)         document.getElementById('title').value           = m.title;
      if (m.teamCount)     document.getElementById('teamCount').value        = m.teamCount;
      if (m.membersPerTeam) document.getElementById('membersPerTeam').value  = m.membersPerTeam;
      if (m.points)        document.getElementById('points').value           = m.points;
      if (m.timerSec)      document.getElementById('timerSec').value         = m.timerSec;
      if (m.minBid)        document.getElementById('minBid').value           = m.minBid;
      // 팀장 채우기
      const teams = Object.values(room.teams || {});
      teams.forEach((t, i) => {
        if (t.photo) leaderPhotos[i] = t.photo;
      });
      renderLeaders();
      // 팀장 이름 채우기
      setTimeout(() => {
        const items = document.querySelectorAll('.leader-item');
        teams.forEach((t, i) => {
          const nameInput = items[i]?.querySelector('.l-name');
          if (nameInput) nameInput.value = t.name || '';
        });
      }, 100);
      // 선수 채우기
      const players = Object.values(room.players || {});
      playerPhotos = {};
      document.querySelector('#player-form-wrap').innerHTML = '';
      players.forEach((p, i) => {
        addPlayer();
        setTimeout(() => {
          const cards = document.querySelectorAll('.pfc');
          const card  = cards[i];
          if (!card) return;
          if (p.name)     card.querySelector('.p-name')?.setAttribute('value', p.name);
          if (p.role)     card.querySelector('.p-role').value  = p.role;
          if (p.grade)    card.querySelector('.p-grade').value = p.grade;
          if (p.curTier)  card.querySelector('.p-cur')?.setAttribute('value', p.curTier);
          if (p.prevTier) card.querySelector('.p-prev')?.setAttribute('value', p.prevTier);
          if (p.peakTier) card.querySelector('.p-peak')?.setAttribute('value', p.peakTier);
          if (p.hero1)    card.querySelector('.p-h1')?.setAttribute('value', p.hero1);
          if (p.hero2)    card.querySelector('.p-h2')?.setAttribute('value', p.hero2);
          if (p.hero3)    card.querySelector('.p-h3')?.setAttribute('value', p.hero3);
          if (p.style)    card.querySelector('.p-style')?.setAttribute('value', p.style);
          if (p.intro)    card.querySelector('.p-intro')?.setAttribute('value', p.intro);
          if (p.photo)    { playerPhotos[i] = p.photo; card.querySelector('.p-photo').value = p.photo; }
          // input 값 직접 세팅 (setAttribute는 초기값만 설정)
          card.querySelectorAll('input, select, textarea').forEach(el => {
            const attr = el.getAttribute('value');
            if (attr !== null && el.tagName === 'INPUT') el.value = attr;
          });
        }, 150);
      });
      _editRoomCode = code;
      // 방 만들기 버튼을 "방 업데이트" 버튼으로 변경
      const createBtn = document.getElementById('create-btn');
      createBtn.textContent = `🔄 [${code}] 방 업데이트`;
      createBtn.style.background = 'linear-gradient(135deg,#3b82f6,#2563eb)';
      createBtn.onclick = updateRoom;
      // 수정 중 안내 배너
      let banner = document.getElementById('edit-mode-banner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'edit-mode-banner';
        banner.style.cssText = 'background:rgba(59,130,246,.15);border:1px solid #3b82f6;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#93c5fd;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;';
        const sectionCreate = document.getElementById('section-create');
        sectionCreate.insertBefore(banner, sectionCreate.children[1]);
      }
      banner.innerHTML = `✏️ <strong style="color:#60a5fa;">[${code}]</strong> 방 수정 중 &nbsp;
        <button onclick="cancelEditMode()" style="background:none;border:1px solid #3b82f6;color:#93c5fd;border-radius:6px;padding:3px 10px;font-size:.75rem;cursor:pointer;font-family:inherit;">취소</button>`;
      showSection('create');
      showToast(`✅ [${code}] 방 데이터 불러오기 완료`);
    } catch(e) {
      showToast('오류: ' + e.message);
    }
  }

  function cancelEditMode() {
    _editRoomCode = null;
    const createBtn = document.getElementById('create-btn');
    createBtn.textContent = '방 만들기 →';
    createBtn.style.background = '';
    createBtn.onclick = createRoom;
    const banner = document.getElementById('edit-mode-banner');
    if (banner) banner.remove();
    showToast('수정 취소됨');
  }

  // ── 이용자 관리 ────────────────────────────────────────────────────
  let _allUsers = {};   // 전체 캐시
  let _userRooms = {};  // uid → 방 목록

  async function loadUsersList() {
    const el    = document.getElementById('users-list-main');
    const stats = document.getElementById('users-stats');
    el.innerHTML = `<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:20px;">불러오는 중...</div>`;
    stats.innerHTML = '';
    try {
      const { ref, get } = window._dbFns;
      const [usersSnap, roomsSnap] = await Promise.all([
        get(ref(window._db, 'users')),
        get(ref(window._db, 'rooms')),
      ]);
      if (!usersSnap.exists()) {
        el.innerHTML = `<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:20px;">가입된 이용자가 없습니다</div>`;
        return;
      }
      _allUsers  = usersSnap.val();
      const rooms = roomsSnap.exists() ? roomsSnap.val() : {};
      _userRooms = {};
      Object.entries(rooms).forEach(([code, room]) => {
        const uid = room.meta?.createdBy;
        if (!uid) return;
        if (!_userRooms[uid]) _userRooms[uid] = [];
        _userRooms[uid].push({
          code, title: room.meta?.title || code,
          status: room.auction?.status || 'waiting',
          createdAt: room.meta?.createdAt || 0
        });
      });
      // 요약 통계
      const total   = Object.keys(_allUsers).length;
      const admins  = Object.values(_allUsers).filter(u => u.role === 'admin').length;
      const hasRoom = Object.keys(_userRooms).length;
      stats.innerHTML = [
        ['👤 총 회원', total],
        ['👑 관리자',  admins],
        ['🏠 방 생성자', hasRoom],
      ].map(([label, val]) =>
        `<div style="flex:1;min-width:80px;background:var(--surface2);border:1px solid var(--border);
          border-radius:8px;padding:10px 12px;text-align:center;">
          <div style="font-size:.68rem;color:var(--muted);margin-bottom:3px;">${label}</div>
          <div style="font-size:1.3rem;font-weight:700;font-family:'Black Han Sans',sans-serif;color:var(--text);">${val}</div>
        </div>`
      ).join('');
      renderUserCards(Object.entries(_allUsers));
    } catch(e) {
      el.innerHTML = `<div style="color:var(--danger);font-size:.82rem;text-align:center;padding:20px;">오류: ${e.message}</div>`;
    }
  }

        ${myRooms.length ? `
          <div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;">생성한 방 (클릭 시 입장)</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;">${roomBadges}</div>` : ''}
      </div>`;
    }).join('');
  }

  function filterUsers() {
    const q = document.getElementById('user-search').value.trim().toLowerCase();
    if (!q) { renderUserCards(Object.entries(_allUsers)); return; }
    const filtered = Object.entries(_allUsers).filter(([uid, u]) =>
      uid.toLowerCase().includes(q) ||
      (u.name || '').toLowerCase().includes(q) ||
      (u.phone || '').includes(q) ||
      (u.email || '').toLowerCase().includes(q)
    );
    renderUserCards(filtered);
  }

  async function toggleAdminUser(uid, isAdmin) {
    const { ref, set } = window._dbFns;
    const msg = isAdmin ? `@${uid} 관리자 권한을 해제하시겠습니까?` : `@${uid} 를 관리자로 설정하시겠습니까?`;
    if (!confirm(msg)) return;
    await set(ref(window._db, `users/${uid}/role`), isAdmin ? null : 'admin');
    showToast(isAdmin ? '관리자 해제 완료' : '👑 관리자 설정 완료');
    loadUsersList();
  }

  async function deleteUser(uid, name) {
    if (!confirm(`「${name}」(@${uid}) 회원을 삭제하시겠습니까?\n삭제 후 복구할 수 없습니다.`)) return;
    try {
      await window._remove(window._dbFns.ref(window._db, `users/${uid}`));
      showToast(`✅ @${uid} 삭제 완료`);
      loadUsersList();
    } catch(e) { showToast('삭제 실패: ' + e.message); }
  }

  // 방 업데이트 (수정 저장)
  async function updateRoom() {
    if (!_editRoomCode) { showToast('수정할 방이 선택되지 않았습니다'); return; }
    const code = _editRoomCode;
    const { ref, get, set } = window._dbFns;
    const { update } = window._dbFns;
    // 현재 폼 데이터 수집 (createRoom과 동일한 방식)
    const title    = document.getElementById('title').value.trim() || '도현 유인원 컵';
    const teamCount       = parseInt(document.getElementById('teamCount').value)      || 6;
    const membersPerTeam  = parseInt(document.getElementById('membersPerTeam').value) || 6;
    const points          = parseInt(document.getElementById('points').value)         || 100;
    const timerSec        = parseInt(document.getElementById('timerSec').value)       || 10;
    const minBid          = parseInt(document.getElementById('minBid').value)         || 1;
    const leaderEls       = document.querySelectorAll('.leader-item');
    const leaderPhotoList = Object.values(leaderPhotos);
    const leaders         = [...leaderEls].map(el => el.querySelector('.l-name')?.value || '');
    if (leaders.some(n => !n.trim())) { showToast('팀장 이름을 모두 입력해주세요'); return; }
    const playerCards = document.querySelectorAll('.pfc');
    const players = [...playerCards].map(card => ({
      name:     card.querySelector('.p-name')?.value    || '',
      role:     card.querySelector('.p-role')?.value    || '',
      grade:    card.querySelector('.p-grade')?.value   || '고',
      curTier:  card.querySelector('.p-cur')?.value     || '',
      prevTier: card.querySelector('.p-prev')?.value    || '',
      peakTier: card.querySelector('.p-peak')?.value    || '',
      hero1:    card.querySelector('.p-h1')?.value      || '',
      hero2:    card.querySelector('.p-h2')?.value      || '',
      hero3:    card.querySelector('.p-h3')?.value      || '',
      style:    card.querySelector('.p-style')?.value   || '',
      intro:    card.querySelector('.p-intro')?.value   || '',
      photo:    card.querySelector('.p-photo')?.value   || '',
    })).filter(p => p.name.trim());
    if (players.length === 0) { showToast('선수를 최소 1명 이상 입력해주세요'); return; }
    // 경매 진행 중 여부 확인
    const { ref: _r, get: _g } = window._dbFns;
    const _statusSnap = await _g(_r(window._db, `rooms/${code}/auction/status`));
    const _currentStatus = _statusSnap.val();
    const _isActive = _currentStatus === 'preview' || _currentStatus === 'bidding';
    if (_isActive) {
      const proceed = confirm(
        `⚠️ 경고: [${code}] 방은 현재 경매가 진행 중입니다!

업데이트하면 모든 경매 데이터(낙찰 기록, 팀 배정, 포인트)가 초기화됩니다.

정말 초기화하고 업데이트하시겠습니까?
(취소하면 /admin-panel 에서 메타 정보만 수정하세요)`
      );
      if (!proceed) return;
    } else if (_currentStatus === 'finished') {
      if (!confirm(`[${code}] 방은 경매가 완료된 상태입니다.
업데이트하면 경매 데이터가 초기화됩니다. 계속할까요?`)) return;
    } else {
      if (!confirm(`[${code}] 방을 업데이트합니다. 계속할까요?`)) return;
    }
    const btn = document.getElementById('create-btn');
    btn.textContent = '업데이트 중...'; btn.style.opacity = '.5'; btn.style.pointerEvents = 'none';
    try {
      // 기존 방 데이터에서 teams의 leaderToken은 유지
      const { ref: dbRef, get: dbGet } = window._dbFns;
      const snap = await dbGet(dbRef(window._db, `rooms/${code}/teams`));
      const oldTeams = snap.val() || {};
      const teams = {};
      leaders.forEach((name, i) => {
        const tk = `team_${i}`;
        teams[tk] = {
          name, points, members: [],
          photo: leaderPhotoList[i] || '',
          leaderToken: oldTeams[tk]?.leaderToken || Math.random().toString(36).substring(2, 10)
        };
      });
      const ROLE_ORDER  = { '딜러': 0, '탱커': 1, '힐러': 2, '유동': 3 };
      const GRADE_ORDER = { '고': 0, '저': 1 };
      const sorted = [...players].sort((a, b) => {
        const rA = ROLE_ORDER[a.role] ?? 99, rB = ROLE_ORDER[b.role] ?? 99;
        if (rA !== rB) return rA - rB;
        return (GRADE_ORDER[a.grade] ?? 1) - (GRADE_ORDER[b.grade] ?? 1);
      });
      const playersObj = {};
      sorted.forEach((p, i) => { playersObj[`player_${i}`] = p; });
      const { ref: dbRef, get: dbGet, set: dbSet, update: dbUpdate } = window._dbFns;
      const createdAtSnap = await dbGet(dbRef(window._db, `rooms/${code}/meta/createdAt`));
      const updData = {
        [`rooms/${code}/meta`]: { title, teamCount, membersPerTeam, points, timerSec, minBid,
          createdAt: createdAtSnap.val() || Date.now(),
          updatedAt: Date.now(),
          createdBy: window._currentUser?.id || 'unknown',
          createdByName: window._currentUser?.name || '알 수 없음' },
        [`rooms/${code}/teams`]:   teams,
        [`rooms/${code}/players`]: playersObj,
        [`rooms/${code}/auction`]: {
          status: 'waiting', order: Object.keys(playersObj),
          currentPlayer: null, currentBid: 0, currentLeader: null, timerEndsAt: null, log: null
        }
      };
      await dbUpdate(dbRef(window._db), updData);
      showToast(`✅ [${code}] 방 업데이트 완료!`);
      cancelEditMode();
      setTimeout(() => { window.location.href = `host.html?room=${code}`; }, 1200);
    } catch(e) {
      showToast('오류: ' + e.message); console.error(e);
    } finally {
      btn.textContent = `🔄 [${code}] 방 업데이트`; btn.style.opacity = ''; btn.style.pointerEvents = '';
    }
  }
  const DB_NAME = 'dohyeon_db', DB_STORE = 'form', DB_KEY = 'form_data';
  function openIDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  }
  async function idbSave(data) {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(data, DB_KEY);
      tx.oncomplete = () => res();
      tx.onerror = e => rej(e);
    });
  }
  async function idbLoad() {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const req = db.transaction(DB_STORE).objectStore(DB_STORE).get(DB_KEY);
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  }

  // 초기화 (섹션은 메인 선택에서 시작)
  // renderLeaders/autoGeneratePlayers 는 showSection('create') 시 호출됨

  // ── 로그인 체크 + 비회원 지원
  (function() {
    const user = sessionStorage.getItem('dohyeon_user');
    // 비회원 세션도 허용 (guest 플래그)
    if (!user) { location.href = 'login.html'; return; }
    const u = JSON.parse(user);
    const bar = document.getElementById('user-bar');
    const nameEl = document.getElementById('user-name-disp');
    if (bar) bar.style.display = 'flex';
    if (nameEl) {
      if (u.guest) {
        nameEl.innerHTML = `비회원 <span style="font-size:.7rem;color:var(--muted);">(임시저장 불가)</span>`;
        // 비회원은 임시저장 버튼 숨김
        const saveBtns = document.getElementById('save-btns');
        if (saveBtns) saveBtns.style.display = 'none';
      } else {
        nameEl.textContent = u.name;
        if (u.role === 'admin') {
          nameEl.innerHTML = `${u.name} <span style="font-size:.7rem;padding:2px 7px;border-radius:8px;
            background:rgba(245,158,11,.2);color:var(--accent);border:1px solid var(--accent);
            font-weight:700;margin-left:4px;">👑 관리자</span>`;
          document.getElementById('admin-pw-section').style.display = 'none';
          const roomSec = document.getElementById('admin-room-section');
          if (roomSec) roomSec.style.display = '';
        }
        // role 없으면 Firebase에서 확인
        if (!u.role) {
          window.addEventListener('load', () => {
            if (!window._dbFns) return;
            const { ref, get } = window._dbFns;
            get(ref(window._db, `users/${u.id}/role`)).then(snap => {
              if (snap.exists() && snap.val() === 'admin') {
                u.role = 'admin';
                sessionStorage.setItem('dohyeon_user', JSON.stringify(u));
                // 관리자 버튼 즉시 표시 (reload 없이)
                const usersBtn = document.getElementById('users-main-btn');
                if (usersBtn) usersBtn.style.display = '';
                document.getElementById('admin-pw-section').style.display = 'none';
                const roomSec = document.getElementById('admin-room-section');
                if (roomSec) roomSec.style.display = '';
              }
            }).catch(()=>{});
          });
        }
      }
      // 로그인 회원이면 "내 방 수정하기" 버튼 표시
      if (!u.guest) {
        const myroomsBtn = document.getElementById('myrooms-main-btn');
        if (myroomsBtn) myroomsBtn.style.display = '';
      }
      // 관리자이면 "이용자 관리" 버튼도 표시
      if (u.role === 'admin') {
        const usersBtn = document.getElementById('users-main-btn');
        if (usersBtn) usersBtn.style.display = '';
      }
    }
    window._currentUser = u;
  })();

  function doLogout() {
    if (confirm('로그아웃 하시겠습니까?')) {
      sessionStorage.removeItem('dohyeon_user');
      location.href = 'login.html';
    }
  }
</script>
